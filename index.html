                        const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];
                        btn.textContent = i === idx ? '✓' : LETTERS[i];
                    });
                }
            },
            _addOpt(id) {
                const q = (this._rec.data.questions || []).find(x => x.id === id);
                if (!q) return;
                if ((q.options || []).length >= 6) { toast('Máx. 6 opções'); return; }
                (q.options = q.options || []).push('');
                const wrap = document.getElementById('qzopts_' + id);
                if (wrap) {
                    const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];
                    const i = q.options.length - 1;
                    const div = document.createElement('div');
                    div.className = 'qz-opt-edit-row';
                    div.innerHTML = `
        <button class="qz-opt-correct-btn ${i === q.correct ? 'on' : ''}"
          onclick="App.activePlugin._setCorrect('${id}',${i})">${i === q.correct ? '✓' : LETTERS[i]}</button>
        <input class="qz-opt-edit-inp" type="text" value=""
          placeholder="Opção ${LETTERS[i]}…"
          oninput="App.activePlugin._setOpt('${id}',${i},this.value)">`;
                    wrap.appendChild(div);
                    div.querySelector('input').focus();
                }
            },

            async _saveEdit() {
                await this._save();
                this._initSession(false);
                toast('💾 Salvo!');
                this._renderEdit();
            },

            async _addQuestion() {
                const id = 'q' + Date.now();
                (this._rec.data.questions = this._rec.data.questions || []).push({
                    id, question: 'Nova pergunta', hint: '',
                    options: ['Opção A', 'Opção B', 'Opção C', 'Opção D'],
                    correct: 0, explanation: ''
                });
                await this._save();
                this._renderEdit();
                setTimeout(() => {
                    const el = document.getElementById('qzecard_' + id);
                    if (el) { el.classList.add('open'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }, 80);
            },

            async _delQuestion(id) {
                this._rec.data.questions = (this._rec.data.questions || []).filter(q => q.id !== id);
                await this._save();
                this._renderEdit();
                toast('Pergunta removida');
            },

            async _importLines() {
                const ta = document.getElementById('qz_import_ta');
                const text = ta?.value.trim();
                if (!text) { toast('Cole as perguntas primeiro'); return; }
                const lines = text.split('\n').filter(l => l.trim());
                let count = 0;
                for (const line of lines) {
                    const parts = line.split('|').map(s => s.trim());
                    if (parts.length < 6) continue;
                    const question = parts[0];
                    const options = parts.slice(1, parts.length - 2);
                    const correctIdx = parseInt(parts[parts.length - 2]) || 0;
                    const explanation = parts[parts.length - 1] || '';
                    if (!question || options.length < 2) continue;
                    (this._rec.data.questions = this._rec.data.questions || []).push({
                        id: 'q' + Date.now() + Math.random().toString(36).slice(2, 6),
                        question, hint: '', options,
                        correct: Math.min(correctIdx, options.length - 1),
                        explanation
                    });
                    count++;
                }
                if (!count) { toast('Nenhuma linha válida encontrada'); return; }
                await this._save();
                if (ta) ta.value = '';
                this._renderEdit();
                toast(`📥 ${count} pergunta${count !== 1 ? 's' : ''} importada${count !== 1 ? 's' : ''}!`);
            },

            /* ── misc ───────────────────────────────── */
            _setMode(m) {
                this._mode = m;
                if (m === 'play') this._initSession(false);
                this._render();
            },

            _calcStreak() {
                const h = [...(this._rec.data.history || [])];
                h.sort((a, b) => b.date - a.date);
                let streak = 0;
                for (const s of h) { if (s.pct >= 60) streak++; else break; }
                return streak;
            },
        });

            _dayCardHtml(day, idx) {

                return `

        onmouseover="this.style.borderColor='var(--acc2)';this.style.color='var(--acc2)'"
        onmouseout="this.style.borderColor='';this.style.color=''"
        onclick="App.activePlugin._addExtra('${day.id}')">+ Adicionar extra</button>

      <div class="hr-time-field" style="margin-bottom:12px">

          type="text" value="${esc(day.obs || '')}" placeholder="Anotações do dia…"

            /* ════════════════════════════════════════════
               VISTA FINANCEIRO
            ════════════════════════════════════════════ */
            _renderFinance() {
                const cont = document.getElementById('hr_content');
                if (!cont) return;

                const saldo = Number(data.saldoAnterior) || 0;
                const adiant = Number(data.adiantamento) || 0;

                cont.innerHTML = `
      <div class="hr-settings">

          <div class="hr-set-field">

          </div>
          <div class="hr-set-field">
            <label>Retorno almoço padrão</label>

              oninput="App.activePlugin._setDefault('retorno',this.value)">
          </div>
          <div class="hr-set-field">
            <label>Hora saída padrão</label>
            <input class="hr-set-inp" type="time"
              value="${data.defaultTimes?.saida || '17:00'}"
              oninput="App.activePlugin._setDefault('saida',this.value)">
          </div>
        </div>
        <button style="margin-top:10px;width:100%;padding:9px;border-radius:10px;background:var(--acc);border:none;color:#fff;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer"
          onclick="App.activePlugin._saveSettings()">Salvar configurações</button>
      </div>

      <div class="hr-finance">
        <div class="hr-fin-title">🧾 Resumo financeiro geral</div>
        <div class="hr-fin-row">
          <span class="lbl">⏱️ Total de horas trabalhadas</span>
          <span class="val">${this._fmtH(totalMins)}</span>
        </div>
        <div class="hr-fin-row">
          <span class="lbl">💵 Ganho por horas (${totalHoras.toFixed(2).replace('.', ',')}h × R$ ${rate.toFixed(2).replace('.', ',')})</span>
          <span class="val green">R$ ${ganhoHoras.toFixed(2).replace('.', ',')}</span>
        </div>
        ${totalExtras ? `
        <div class="hr-fin-row">
          <span class="lbl">🔧 Extras / Serviços adicionais</span>
          <span class="val green">R$ ${totalExtras.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        ${saldo ? `
        <div class="hr-fin-row">
          <span class="lbl">↩️ Saldo anterior</span>
          <span class="val ${saldo >= 0 ? 'green' : 'red'}">R$ ${saldo.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        ${adiant ? `
        <div class="hr-fin-row">
          <span class="lbl">💸 Adiantamento descontado</span>
          <span class="val red">– R$ ${adiant.toFixed(2).replace('.', ',')}</span>
        </div>` : ''}
        <div class="hr-fin-sep"></div>
        <div class="hr-fin-total">
          <span class="hr-fin-total-lbl">💰 Total a receber</span>
          <span class="hr-fin-total-val" style="color:${isPos ? 'var(--green)' : 'var(--red)'}">
            R$ ${Math.abs(total).toFixed(2).replace('.', ',')}${!isPos ? ' (negativo)' : ''}
          </span>
        </div>
      </div>
<div class="hr-section-lbl">📋 Relatório completo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="hr-export-btn primary" style="margin-bottom:0"
          onclick="App.activePlugin._copyReport('all')">
          📋 Copiar texto
        </button>
                <button class="hr-export-btn" style="margin-bottom:0"
          onclick="App.activePlugin._export()">
          📤 Baixar .txt
        </button>
      </div>

      <div class="hr-section-lbl">📆 Apenas esta semana</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="hr-export-btn" style="margin-bottom:0;border-color:var(--acc-glow);color:var(--acc2)"
          onclick="App.activePlugin._copyReport('week')">
          📋 Copiar texto
        </button>
        <button class="hr-export-btn" style="margin-bottom:0"
          onclick="App.activePlugin._exportWeek()">
          📤 Baixar .txt
        </button>
      </div>`;
            },

            /* ════════════════════════════════════════════
               FORM — novo dia (bottom sheet)
            ════════════════════════════════════════════ */
            _openDayForm(dateStr) {
                const def = this._rec.data.defaultTimes || {};
                const today = dateStr || this._dateKey(new Date());
                const newDay = {
                    id: 'd' + Date.now(),
                    date: today,
                    entrada: def.entrada || '08:00',
                    almoco: def.almoco || '12:30',
                    retorno: def.retorno || '13:30',
                    saida: def.saida || '17:00',
                    extras: [],
                    obs: '',
                };
                // check if day already exists
                const exists = this._rec.data.days.find(d => d.date === today);
                if (exists) {
                    toast('Já existe registro para hoje. Abra o card para editar.');
                    this._weekOffset = 0;
                    this._render();
                    return;
                }

                const ov = document.createElement('div');
                ov.className = 'overlay'; ov.id = 'hr_form_ov';
                ov.innerHTML = `
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <span class="sheet-title">📅 Registrar dia</span>
          <button class="x-btn" onclick="App.activePlugin._closeForm()">✕</button>
        </div>
        <div style="padding:0 20px 24px">
          <div class="hr-set-field" style="margin-bottom:12px">
            <label>Data</label>
            <input class="hr-set-inp" type="date" id="hr_new_date" value="${today}"
              oninput="App.activePlugin._newDay.date=this.value">
          </div>
          <div class="hr-time-grid">
            <div class="hr-time-field">
              <label>🟢 Entrada</label>
              <input class="hr-time-inp" type="time" id="hr_new_entrada" value="${newDay.entrada}"
                oninput="App.activePlugin._newDay.entrada=this.value">
            </div>
            <div class="hr-time-field">
              <label>🍽️ Almoço</label>
              <input class="hr-time-inp" type="time" id="hr_new_almoco" value="${newDay.almoco}"
                oninput="App.activePlugin._newDay.almoco=this.value">
            </div>
            <div class="hr-time-field">
              <label>🔄 Retorno</label>
              <input class="hr-time-inp" type="time" id="hr_new_retorno" value="${newDay.retorno}"
                oninput="App.activePlugin._newDay.retorno=this.value">
            </div>
            <div class="hr-time-field">
              <label>🔴 Saída</label>
              <input class="hr-time-inp" type="time" id="hr_new_saida" value="${newDay.saida}"
                oninput="App.activePlugin._newDay.saida=this.value">
            </div>
          </div>
          <div class="hr-set-field" style="margin-bottom:16px">
            <label>📝 Observações</label>
            <input class="hr-set-inp" type="text" placeholder="Anotações do dia…"
              oninput="App.activePlugin._newDay.obs=this.value">
          </div>
          <button style="width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,var(--acc),#9e8cfb);border:none;color:#fff;font-family:var(--fd);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px var(--acc-glow)"
            onclick="App.activePlugin._confirmNewDay()">✓ Salvar dia</button>
        </div>
      </div>`;

                this._newDay = newDay;
                ov.onclick = e => { if (e.target === ov) this._closeForm(); };
                document.body.appendChild(ov);
                requestAnimationFrame(() => ov.classList.add('on'));
            },

            async _confirmNewDay() {
                const d = this._newDay;
                if (!d.date) { toast('Escolha uma data'); return; }
                if (this._rec.data.days.find(x => x.id !== d.id && x.date === d.date)) {
                    toast('Já existe registro para esta data'); return;
                }
                this._rec.data.days.push(d);
                await this._save();
                this._closeForm();
                this._weekOffset = 0;
                this._render();
                toast('✓ Dia registrado!');
            },

            _closeForm() {
                const ov = document.getElementById('hr_form_ov');
                if (!ov) return;
                ov.classList.remove('on');
                setTimeout(() => ov.remove(), 320);
                this._newDay = null;
            },

            /* ════════════════════════════════════════════
               DAY CARD INTERACTIONS
            ════════════════════════════════════════════ */
            _toggleDay(id) {
                document.getElementById('hrday_' + id)?.classList.toggle('open');
            },

            _setDayField(id, field, val) {
                const day = this._rec.data.days.find(d => d.id === id);
                if (!day) return;
                day[field] = val;
                // live update result display
                const mins = this._dayMinutes(day);
                const earn = (mins / 60) * (this._rec.data.hourRate || 0);
                const res = document.getElementById('hrres_' + id);
                if (res) res.textContent = `${this._fmtH(mins)} · R$ ${earn.toFixed(2).replace('.', ',')}`;
            },

            _addExtra(id) {
                const day = this._rec.data.days.find(d => d.id === id);
                if (!day) return;
                day.extras = day.extras || [];
                day.extras.push({ desc: '', value: 0 });
                // re-render body only
                const body = document.getElementById('hrbody_' + id);
                if (body) body.innerHTML = this._dayFormHtml(day);
            },

            _removeExtra(id, idx) {
                const day = this._rec.data.days.find(d => d.id === id);
                if (!day) return;
                day.extras.splice(idx, 1);
                const body = document.getElementById('hrbody_' + id);
                if (body) body.innerHTML = this._dayFormHtml(day);
            },

            _setExtra(id, idx, field, val) {
                const day = this._rec.data.days.find(d => d.id === id);
                if (day?.extras?.[idx]) day.extras[idx][field] = val;
            },

            async _saveDay(id) {
                await this._save();
                // refresh card
                const day = this._rec.data.days.find(d => d.id === id);
                if (!day) return;
                const card = document.getElementById('hrday_' + id);
                if (card) {
                    const wasOpen = card.classList.contains('open');
                    const mins = this._dayMinutes(day);
                    const earn = (mins / 60) * (this._rec.data.hourRate || 0);
                    const dateStr = new Date(day.date + 'T12:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
                    const timeStr = day.entrada && day.saida ? `${day.entrada} → ${day.saida}` : 'Horário incompleto';
                    const badgeCls = mins >= 480 ? 'ok' : mins > 0 ? 'low' : 'zero';
                    const badgeTxt = mins > 0 ? this._fmtH(mins) : '—';
                    const extraSum = (day.extras || []).reduce((s, e) => s + (Number(e.value) || 0), 0);
                    card.querySelector('.hr-day-name').textContent = dateStr;
                    card.querySelector('.hr-day-sub').textContent = `${timeStr}${extraSum ? ` · +R$ ${extraSum.toFixed(2).replace('.', ',')} extras` : ''}`;
                    card.querySelector('.hr-day-badge').className = `hr-day-badge ${badgeCls}`;
                    card.querySelector('.hr-day-badge').textContent = badgeTxt;
                    if (!wasOpen) card.classList.remove('open');
                }
                toast('💾 Salvo!');
            },

            async _deleteDay(id) {
                this._rec.data.days = this._rec.data.days.filter(d => d.id !== id);
                await this._save();
                this._render();
                toast('Dia removido');
            },

            /* ════════════════════════════════════════════
               SETTINGS
            ════════════════════════════════════════════ */
            _setDefault(field, val) {
                if (!this._rec.data.defaultTimes) this._rec.data.defaultTimes = {};
                this._rec.data.defaultTimes[field] = val;
            },
            async _saveSettings() {
                await this._save();
                toast('⚙️ Configurações salvas!');
            },

            /* ════════════════════════════════════════════
               EXPORT
            ════════════════════════════════════════════ */
            _buildReport(days, title) {
                const data = this._rec.data;
                const rate = data.hourRate || 0;
                const lines = [`${title}`, `Gerado em: ${new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`, `Valor/hora: R$ ${rate.toFixed(2).replace('.', ',')}`, '─'.repeat(42)];

                let totalMins = 0;
                let totalExtra = 0;

                for (const day of days.sort((a, b) => a.date.localeCompare(b.date))) {
                    const mins = this._dayMinutes(day);
                    const earn = (mins / 60) * rate;
                    const extras = (day.extras || []).reduce((s, e) => s + (Number(e.value) || 0), 0);
                    totalMins += mins;
                    totalExtra += extras;
                    const dateStr = new Date(day.date + 'T12:00').toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' });
                    lines.push('');
                    lines.push(`📅 ${dateStr}`);
                    lines.push(`   Entrada: ${day.entrada || '—'}   Almoço: ${day.almoco || '—'}`);
                    lines.push(`   Retorno: ${day.retorno || '—'}   Saída:  ${day.saida || '—'}`);
                    lines.push(`   ⏱ Horas: ${this._fmtH(mins)}   💵 R$ ${earn.toFixed(2).replace('.', ',')}`);
                    if (day.extras?.length) {
                        for (const e of day.extras) lines.push(`   🔧 Extra: ${e.desc || '—'} = R$ ${Number(e.value).toFixed(2).replace('.', ',')}`);
                    }
                    if (day.obs) lines.push(`   📝 ${day.obs}`);
                }

                lines.push('');
                lines.push('═'.repeat(42));
                lines.push(`⏱ Total horas: ${this._fmtH(totalMins)}`);
                lines.push(`💵 Ganho horas: R$ ${((totalMins / 60) * rate).toFixed(2).replace('.', ',')}`);
                if (totalExtra) lines.push(`🔧 Extras:      R$ ${totalExtra.toFixed(2).replace('.', ',')}`);

                const saldo = Number(data.saldoAnterior) || 0;
                const adiant = Number(data.adiantamento) || 0;
                if (saldo) lines.push(`↩ Saldo ant.:  R$ ${saldo.toFixed(2).replace('.', ',')}`);
                if (adiant) lines.push(`💸 Adiant.:   – R$ ${adiant.toFixed(2).replace('.', ',')}`);

                const total = (totalMins / 60) * rate + totalExtra + saldo - adiant;
                lines.push('─'.repeat(42));
                lines.push(`💰 TOTAL A RECEBER: R$ ${total.toFixed(2).replace('.', ',')}`);
                lines.push('─'.repeat(42));
                return lines.join('\n');
            },

            _export() {
                const text = this._buildReport(this._rec.data.days, 'RELATÓRIO COMPLETO DE HORAS');
                this._downloadTxt(text, `horas_completo_${this._dateKey(new Date())}.txt`);
                toast('📤 Arquivo .txt baixado!');
            },

            _exportWeek() {
                const { start, end } = this._weekRange(this._weekOffset);
                const days = this._rec.data.days.filter(d => d.date >= start && d.date <= end);
                const startFmt = new Date(start + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
                const endFmt = new Date(end + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
                const text = this._buildReport(days, `RELATÓRIO SEMANAL: ${startFmt} – ${endFmt}`);
                this._downloadTxt(text, `horas_semana_${start}.txt`);
                toast('📤 Arquivo .txt baixado!');
            },

            async _copyReport(scope) {
                let text, label;
                if (scope === 'week') {
                    const { start, end } = this._weekRange(this._weekOffset);
                    const days = this._rec.data.days.filter(d => d.date >= start && d.date <= end);
                    const startFmt = new Date(start + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
                    const endFmt = new Date(end + 'T12:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
                    text = this._buildReport(days, `RELATÓRIO SEMANAL: ${startFmt} – ${endFmt}`);
                    label = 'semana';
                } else {
                    text = this._buildReport(this._rec.data.days, 'RELATÓRIO COMPLETO DE HORAS');
                    label = 'relatório completo';
                }
                try {
                    await navigator.clipboard.writeText(text);
                    toast(`📋 ${label === 'semana' ? 'Semana copiada' : 'Relatório copiado'}! Cole no WhatsApp ou e-mail.`);
                } catch {
                    /* fallback para dispositivos sem clipboard API */
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                    document.body.appendChild(ta);
                    ta.focus(); ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    toast(`📋 Texto copiado! Cole onde quiser.`);
                }
            },

            _downloadTxt(text, filename) {
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            },

            /* ════════════════════════════════════════════
               HELPERS
            ════════════════════════════════════════════ */
            _setView(v) { this._view = v; this._render(); },
            _shiftWeek(delta) {
                if (delta === 0) this._weekOffset = 0;
                else this._weekOffset += delta;
                this._renderWeek();
            },

            _weekRange(offset = 0) {
                const now = new Date();
                const dow = now.getDay(); // 0=dom
                const mon = new Date(now);
                mon.setDate(now.getDate() - dow + (dow === 0 ? -6 : 1) + offset * 7);
                const sun = new Date(mon);
                sun.setDate(mon.getDate() + 6);
                return { start: this._dateKey(mon), end: this._dateKey(sun) };
            },

            _dayMinutes(day) {
                if (!day.entrada || !day.saida) return 0;
                const toMin = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                const entrada = toMin(day.entrada);
                const saida = toMin(day.saida);
                let worked = saida - entrada;
                if (day.almoco && day.retorno) {
                    const al = toMin(day.almoco);
                    const ret = toMin(day.retorno);
                    if (ret > al) worked -= (ret - al);
                }
                return Math.max(0, worked);
            },

            _fmtH(mins) {
                const h = Math.floor(mins / 60), m = mins % 60;
                return m ? `${h}h${String(m).padStart(2, '0')}` : `${h}h`;
            },

            _dateKey(d) {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            },
        });
    </script>
