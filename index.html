                if (p === 100 && t) return '<span class="badge badge-g">✓ Completa</span>';
                if (p > 0) return `<span class="badge badge-a">${p}% feito</span>`;
                return '<span class="badge badge-p">Nova</span>';
            },

            /* ── Botões extras na nav bar ───────────── */
            navActions: [{
                id: 'clear',
                icon: '🧹',
                title: 'Limpar marcados',
                handler(rec) { App.activePlugin._clearDone(); },
            }],

            /* ── Categorias disponíveis ─────────────── */
            _CATS: [
                { id: 'geral', icon: '🏷️', label: 'Geral' },
                { id: 'frutas', icon: '🍎', label: 'Frutas' },
                { id: 'limpeza', icon: '🧹', label: 'Limpeza' },
                { id: 'bebidas', icon: '🥤', label: 'Bebidas' },
                { id: 'frios', icon: '🧀', label: 'Frios' },
                { id: 'padaria', icon: '🍞', label: 'Padaria' },
                { id: 'carnes', icon: '🥩', label: 'Carnes' },
            ],

            /* ══ HOOKS ══════════════════════════════════
               mount   → chamado ao abrir o plugin
               unmount → chamado ao fechar
               _render → re-renderiza o conteúdo completo
            ═════════════════════════════════════════════ */

            _el: null,
            _rec: null,

            mount(container, rec) {
                this._el = container;
                this._rec = rec;
                this._render();
            },

            unmount() {
                this._el = null;
                this._rec = null;
            },

            /* ── Renderização completa ──────────────── */
            _render() {
                if (!this._el) return;

                const items = this._rec.data.items || [];
                const done = items.filter(i => i.done).length;
                const total = items.length;
                const pct = total ? Math.round(done / total * 100) : 0;
                const qty = this._rec.data.qty || 1;
                const selCat = this._rec.data.cat || 'geral';
                const catMap = Object.fromEntries(this._CATS.map(c => [c.id, c]));

                // Update nav subtitle
                document.getElementById('pluginNavSub').textContent =
                    `${total} iten${total !== 1 ? 's' : ''} · ${done} marcado${done !== 1 ? 's' : ''}`;

                // Group items by category (preserve insertion order)
                const groups = {};
                items.forEach(item => {
                    (groups[item.cat] = groups[item.cat] || []).push(item);
                });

                this._el.innerHTML = `
      <div class="sl-wrap">

        <div class="sl-progress">
          <div class="sl-prog-info">
            <div class="sl-prog-lbl">Progresso da lista</div>
            <div class="sl-prog-track">
              <div class="sl-prog-bar" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="sl-prog-pct">${pct}%</div>
        </div>

        <div class="sl-add">
          <input class="sl-inp" id="sl_inp" type="text" placeholder="Adicionar item…"
            onkeydown="if(event.key==='Enter')App.activePlugin._addItem()">
          <div class="sl-qty">
            <button class="sl-qb" onclick="App.activePlugin._changeQty(-1)">−</button>
            <span class="sl-qn">${qty}</span>
            <button class="sl-qb" onclick="App.activePlugin._changeQty(1)">+</button>
          </div>
          <button class="sl-addbtn" onclick="App.activePlugin._addItem()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <div class="sl-cats">
          ${this._CATS.map(c => `
            <button class="sl-cat ${selCat === c.id ? 'on' : ''}"
              onclick="App.activePlugin._setCat('${c.id}')">
              ${c.icon} ${c.label}
            </button>`).join('')}
        </div>

        ${total === 0 ? `
          <div class="empty" style="padding:36px 20px">
            <span class="ico">🛒</span>
            <h3>Lista vazia</h3>
            <p>Use o campo acima para adicionar itens à lista.</p>
          </div>` :
                        Object.entries(groups).map(([catId, catItems]) => {
                            const cm = catMap[catId] || { icon: '🏷️', label: catId };
                            const catDone = catItems.filter(i => i.done).length;
                            return `
              <div class="sl-section">
                <div class="sl-sec-head">
                  <span class="sl-sec-ico">${cm.icon}</span>
                  <span class="sl-sec-name">${cm.label}</span>
                  <span class="sl-sec-cnt">${catDone}/${catItems.length}</span>
                </div>
                ${catItems.map((item, ix) => `
                  <div class="sl-item ${item.done ? 'done' : ''}" style="animation-delay:${ix * .04}s">
                    <div class="sl-cb" onclick="App.activePlugin._toggle('${item.id}')">
                      ${item.done
                                    ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
                                    : ''}
                    </div>
                    <span class="sl-item-name">${esc(item.name)}</span>
                    ${item.qty > 1 ? `<span class="sl-item-qty">×${item.qty}</span>` : ''}
                    <button class="sl-delbtn" onclick="App.activePlugin._delete('${item.id}')">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </div>`).join('')}
              </div>`;
                        }).join('')}

        <div style="height:12px"></div>
      </div>`;
            },

            /* ── Actions ────────────────────────────── */
            async _save() { await App.saveRecord(this._rec); },

            _changeQty(d) {
                this._rec.data.qty = Math.max(1, (this._rec.data.qty || 1) + d);
                this._save(); this._render();
            },

            _setCat(id) {
                this._rec.data.cat = id;
                this._save(); this._render();
                setTimeout(() => document.getElementById('sl_inp')?.focus(), 40);
            },

            async _addItem() {
                const inp = document.getElementById('sl_inp');
                const name = inp?.value.trim();
                if (!name) { inp?.focus(); return; }
                this._rec.data.items.push({
                    id: 'i' + Date.now(),
                    name,
                    qty: this._rec.data.qty || 1,
                    cat: this._rec.data.cat || 'geral',
                    done: false,
                });
                this._rec.data.qty = 1;
                await this._save();
                this._render();
                document.getElementById('sl_inp')?.focus();
            },

            async _toggle(id) {
                const item = this._rec.data.items.find(i => i.id === id);
                if (item) { item.done = !item.done; await this._save(); this._render(); }
            },

            async _delete(id) {
                this._rec.data.items = this._rec.data.items.filter(i => i.id !== id);
                await this._save(); this._render();
            },

            async _clearDone() {
                const before = this._rec.data.items.length;
                this._rec.data.items = this._rec.data.items.filter(i => !i.done);
                const removed = before - this._rec.data.items.length;
                if (!removed) { toast('Nenhum item marcado'); return; }
                await this._save(); this._render();
                toast(`${removed} item${removed !== 1 ? 's' : ''} removido${removed !== 1 ? 's' : ''}`);
            },

        });
    </script>

    <!-- ═══════════════ ▼SCRIPT (substitui o bloco do plugin 'fluxo' antigo) ═══════════════ -->
    <script>
        registerPlugin({

            /* ── Identidade ─────────────────────────── */
            id: 'fluxo',
            name: 'Fluxograma',
            icon: '🔀',
            color: '#22d3ee',

            /*
              Estrutura de um nó:
              {
                id, type:'question', question, hint,
                yes: branch, no: branch
              }
          
              branch pode ser:
                { type:'next',   nextId }
                { type:'result', resultType:'ok'|'warn'|'err'|'info',
                  icon, title, desc,
                  costType: 'part'|'labor'|'none',   ← NOVO
                  costLabel,                          ← NOVO (nome da peça / serviço)
                  costValue,                          ← NOVO (R$ unitário)
                  costUnit,                           ← NOVO ('un'|'h'|'m'|'kg')
                }
            */
            defaultData: () => ({
                laborRate: 120,   // R$/h padrão
                nodes: {
                    'n1': {
                        id: 'n1', type: 'question',
                        question: 'O carro está com a bateria nova?', hint: '',
                        yes: { type: 'next', nextId: 'n2' },
                        no: { type: 'next', nextId: 'n3' },
                    },
                    'n2': {
                        id: 'n2', type: 'question',
                        question: 'Já testou o alternador?', hint: '',
                        yes: { type: 'next', nextId: 'n4' },
                        no: {
                            type: 'result', resultType: 'err', icon: '⚡',
                            title: 'Testar alternador', desc: 'Leve ao eletricista para diagnóstico.',
                            costType: 'labor', costLabel: 'Diagnóstico elétrico', costValue: 150, costUnit: 'h'
                        },
                    },
                    'n3': {
                        id: 'n3', type: 'question',
                        question: 'A bateria antiga carrega normalmente?', hint: '',
                        yes: {
                            type: 'result', resultType: 'ok', icon: '✅',
                            title: 'Bateria OK', desc: 'Verifique outros componentes.',
                            costType: 'none'
                        },
                        no: {
                            type: 'result', resultType: 'warn', icon: '🔋',
                            title: 'Substituir bateria', desc: 'Bateria fraca ou defeituosa.',
                            costType: 'part', costLabel: 'Bateria automotiva 60Ah', costValue: 380, costUnit: 'un'
                        },
                    },
                    'n4': {
                        id: 'n4', type: 'question',
                        question: 'O alternador gera tensão acima de 13,5V?',
                        hint: 'Use um multímetro com o motor ligado.',
                        yes: {
                            type: 'result', resultType: 'ok', icon: '✅',
                            title: 'Sistema elétrico OK', desc: 'Bateria e alternador normais.',
                            costType: 'none'
                        },
                        no: {
                            type: 'result', resultType: 'err', icon: '⚡',
                            title: 'Substituir alternador', desc: 'Alternador fraco. Substituição necessária.',
                            costType: 'part', costLabel: 'Alternador remanufaturado', costValue: 520, costUnit: 'un'
                        },
                    },
                },
                rootId: 'n1',
                /* session.checked: { resultKey: { qty } } — itens marcados pelo usuário */
                session: { path: [], done: false, checked: {} },
            }),

            /* ── Card na home ───────────────────────── */
            cardPreview(rec) {
                const total = Object.keys(rec.data.nodes || {}).length;
                const checked = Object.keys(rec.data.session?.checked || {}).length;
                const total$ = this._totalCost(rec.data);
                const parts = [
                    `${total} nó${total !== 1 ? 's' : ''}`,
                    checked ? `${checked} item${checked !== 1 ? 's' : ''} marcado${checked !== 1 ? 's' : ''}` : null,
                    total$ > 0 ? `R$ ${total$.toFixed(2).replace('.', ',')}` : null,
                ].filter(Boolean);
                return parts.join(' · ');
            },
            cardBadge(rec) {
                if (rec.data.session?.done) {
                    const t = this._totalCost(rec.data);
                    if (t > 0) return `<span class="badge badge-g">R$ ${t.toFixed(2).replace('.', ',')}</span>`;
                    return '<span class="badge badge-g">✓ Concluído</span>';
                }
                if ((rec.data.session?.path || []).length) return '<span class="badge badge-a">Em andamento</span>';
                return '<span class="badge badge-p">Novo</span>';
            },

            navActions: [
                {
                    id: 'reset', icon: '↺', title: 'Reiniciar diagnóstico',
                    handler() { App.activePlugin._resetSession(); }
                },
            ],

            /* ── Estado interno ─────────────────────── */
            _el: null, _rec: null, _mode: 'run',

            /* ══ HOOKS ══════════════════════════════════ */
            mount(container, rec) {
                this._el = container; this._rec = rec; this._mode = 'run';
                // migrate: ensure session.checked exists
                if (!this._rec.data.session.checked) this._rec.data.session.checked = {};
                if (!this._rec.data.laborRate) this._rec.data.laborRate = 120;
                this._render();
            },
            unmount() { this._el = null; this._rec = null; },
            async _save() { await App.saveRecord(this._rec); },

            /* ════════════════════════════════════════════
               RENDER PRINCIPAL
            ════════════════════════════════════════════ */
            _render() {
                if (!this._el) return;
                const { session, nodes } = this._rec.data;
                const total = Object.keys(nodes).length;
                const steps = session.path.length;
                const pct = session.done ? 100 : total ? Math.min(Math.round(steps / total * 100), 95) : 0;

                document.getElementById('pluginNavSub').textContent =
                    this._mode === 'edit' ? 'Editando fluxo' :
                        session.done ? `Concluído · ${pct}%` : `${pct}% percorrido`;

                this._el.innerHTML = `
      <div class="fl-wrap">
        <div class="fl-tabs">
          <button class="fl-tab ${this._mode === 'run' ? 'on' : ''}"
            onclick="App.activePlugin._setMode('run')">▶ Diagnóstico</button>
          <button class="fl-tab ${this._mode === 'edit' ? 'on' : ''}"
            onclick="App.activePlugin._setMode('edit')">✏️ Editar fluxo</button>
        </div>
        <div id="fl_content"></div>
        <div style="height:16px"></div>
      </div>`;

                this._mode === 'run' ? this._renderRun() : this._renderEdit();
            },

            /* ════════════════════════════════════════════
               RUN MODE
            ════════════════════════════════════════════ */
            _renderRun() {
                const cont = document.getElementById('fl_content');
                const { session, nodes, rootId, laborRate } = this._rec.data;

                // build chain from session.path
                let html = `<div class="fl-chain">`;
                let nodeId = rootId;

                for (let i = 0; i < session.path.length; i++) {
                    const step = session.path[i];
                    const node = nodes[step.nodeId];
                    if (!node) break;
                    html += this._answeredNodeHtml(node, step.answer, i);

                    const branch = node[step.answer];
                    if (branch?.type === 'result') {
                        html += this._resultCardHtml(branch, step.nodeId + '_' + step.answer);
                        nodeId = null;
                    } else if (branch?.type === 'next') {
                        html += `<div class="fl-conn-line" style="margin-left:18px"></div>`;
                        nodeId = branch.nextId;
                    }
                }

                // current question (if not done)
                if (!session.done && nodeId && nodes[nodeId]) {
                    html += this._currentQuestionHtml(nodes[nodeId], session.path.length);
                }

                html += '</div>';

                // budget panel (always visible if anything is checked or done)
                const budgetHtml = this._budgetPanelHtml();

                cont.innerHTML = html + budgetHtml;

                // scroll to bottom
                setTimeout(() => {
                    cont.closest('.view-scroll')?.scrollTo({ top: 99999, behavior: 'smooth' });
                }, 80);
            },

            _answeredNodeHtml(node, answer, idx) {
                return `
      <div class="fl-node done">
        <div class="fl-qcard">
          <div class="fl-qnum">Etapa ${idx + 1}</div>
          <div class="fl-question">${esc(node.question)}</div>
          <span class="fl-answer-badge ${answer}">
            ${answer === 'yes' ? '✓ Sim' : '✕ Não'}
          </span>
        </div>
      </div>`;
            },

            _currentQuestionHtml(node, idx) {
                return `
      <div class="fl-node active">
        <div class="fl-qcard active">
          <div class="fl-qnum">Etapa ${idx + 1}</div>
          <div class="fl-question">${esc(node.question)}</div>
          ${node.hint ? `<div class="fl-hint">💡 ${esc(node.hint)}</div>` : ''}
        </div>
        <div class="fl-btns">
          <button class="fl-ans-btn yes" onclick="App.activePlugin._answer('${node.id}','yes')">
            ✓ Sim
          </button>
          <button class="fl-ans-btn no" onclick="App.activePlugin._answer('${node.id}','no')">
            ✕ Não
          </button>
        </div>
      </div>`;
            },

            _resultCardHtml(branch, key) {
                const checked = this._rec.data.session.checked;
                const item = checked[key] || null;
                const isChecked = !!item;
                const qty = item?.qty ?? 1;
                const type = branch.costType || 'none';
                const hasValue = type !== 'none' && branch.costValue > 0;

                const valueStr = hasValue
                    ? `R$ ${Number(branch.costValue).toFixed(2).replace('.', ',')}`
                    : '';
                const typeLabel = type === 'part' ? '🔩 Peça' : type === 'labor' ? '🔧 Mão de obra' : '';

                const costRowHtml = hasValue ? `
      <div class="fl-cost-row">
        <div class="fl-cost-check ${isChecked ? 'on' : ''}"
          onclick="App.activePlugin._toggleCheck('${key}',${branch.costValue || 0},'${type}',${branch.costValue || 0})">
          ${isChecked ? '✓' : ''}
        </div>
        <div class="fl-cost-info">
          <div class="fl-cost-label">${esc(branch.costLabel || branch.title)}</div>
          <div class="fl-cost-type">${typeLabel} · ${valueStr} / ${branch.costUnit || 'un'}</div>
          ${isChecked && type !== 'none' ? `
            <div class="fl-cost-qty">
              <button class="fl-cost-qty-btn" onclick="App.activePlugin._changeQty('${key}',-1)">−</button>
              <span class="fl-cost-qty-val">${qty}</span>
              <button class="fl-cost-qty-btn" onclick="App.activePlugin._changeQty('${key}',1)">+</button>
              <span style="font-size:11px;color:var(--text3);margin-left:4px">${branch.costUnit || 'un'}</span>
            </div>` : ''}
        </div>
        ${isChecked ? `<div class="fl-cost-value">R$ ${(Number(branch.costValue) * qty).toFixed(2).replace('.', ',')}</div>` : ''}
      </div>` : `
      <div class="fl-cost-row" style="opacity:.5">
        <div class="fl-cost-check ${isChecked ? 'on' : ''}"
          onclick="App.activePlugin._toggleCheck('${key}',0,'${type}',0)">
          ${isChecked ? '✓' : ''}
        </div>
        <div class="fl-cost-info">
          <div class="fl-cost-label">${isChecked ? '✓ Executado' : 'Marcar como executado'}</div>
          <div class="fl-cost-type">Sem custo cadastrado</div>
        </div>
      </div>`;

                return `
      <div class="fl-result ${branch.resultType || 'info'}">
        <div class="fl-result-head">
          <span class="fl-result-ico">${branch.icon || '📌'}</span>
          <span class="fl-result-title">${esc(branch.title)}</span>
        </div>
        ${branch.desc ? `<div class="fl-result-desc">${esc(branch.desc)}</div>` : ''}
        ${costRowHtml}
      </div>`;
            },

            _answer(nodeId, answer) {
                const sess = this._rec.data.session;
                const nodes = this._rec.data.nodes;
                if (sess.path.find(s => s.nodeId === nodeId)) return;

                sess.path.push({ nodeId, answer });

                const branch = nodes[nodeId]?.[answer];
                if (branch?.type === 'result') {
                    sess.done = true;
                } else if (branch?.type === 'next' && !nodes[branch.nextId]) {
                    sess.done = true;
                }

                this._save().then(() => this._renderRun());
            },

            async _toggleCheck(key, unitPrice, type, rawVal) {
                const checked = this._rec.data.session.checked;
                if (checked[key]) {
                    delete checked[key];
                } else {
                    checked[key] = { qty: 1, unitPrice: Number(rawVal) || 0, type };
                }
                await this._save();
                this._renderRun();
            },

            async _changeQty(key, delta) {
                const checked = this._rec.data.session.checked;
                if (!checked[key]) return;
                checked[key].qty = Math.max(1, (checked[key].qty || 1) + delta);
                await this._save();
                this._renderRun();
            },

            /* ── Budget panel ───────────────────────── */
            _budgetPanelHtml() {
                const { session, nodes } = this._rec.data;
                const checked = session.checked || {};
                const keys = Object.keys(checked);
                if (!keys.length && !session.done) return '';

                // rebuild items from checked + nodes
                const items = [];
                for (const key of keys) {
                    const item = checked[key];
                    // key is like 'n2_no' — find the branch
                    const [nodeId, answer] = key.split('_');
                    const branch = nodes[nodeId]?.[answer];
                    if (!branch) continue;
                    const unitPrice = Number(branch.costValue) || 0;
                    const qty = item.qty || 1;
                    items.push({
                        label: branch.costLabel || branch.title,
                        type: branch.costType || 'none',
                        unit: branch.costUnit || 'un',
                        unitPrice, qty,
                        subtotal: unitPrice * qty,
                    });
                }

                if (!items.length) {
                    if (!session.done) return '';
                    return `
        <div class="fl-budget">
          <div class="fl-budget-title">🧾 Orçamento</div>
          <div class="fl-budget-empty">Nenhum item marcado ainda.<br>
            Marque os itens executados nos resultados acima.</div>
        </div>`;
                }

                const parts = items.filter(i => i.type === 'part');
                const labor = items.filter(i => i.type === 'labor');
                const others = items.filter(i => i.type === 'none');

                const rows = (list, icon) => list.map(i => `
      <div class="fl-budget-line">
        <span class="name">${icon} ${esc(i.label)}</span>
        <span class="qty">${i.qty}×</span>
        <span class="val">R$ ${i.subtotal.toFixed(2).replace('.', ',')}</span>
      </div>`).join('');

                const total = items.reduce((s, i) => s + i.subtotal, 0);

                return `
      <div class="fl-budget">
        <div class="fl-budget-title">🧾 Orçamento do serviço</div>
        ${parts.length ? `<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">🔩 Peças</div>${rows(parts, '')}` : ''}
        ${labor.length ? `<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">🔧 Mão de obra</div>${rows(labor, '')}` : ''}
        ${others.length ? `<div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">📌 Outros</div>${rows(others, '')}` : ''}
        <div class="fl-budget-sep"></div>
        <div class="fl-budget-total">
          <span class="fl-budget-lbl">Total a cobrar</span>
          <span class="fl-budget-sum">R$ ${total.toFixed(2).replace('.', ',')}</span>
        </div>
      </div>`;
            },

            _totalCost(data) {
                const checked = data.session?.checked || {};
                const nodes = data.nodes || {};
                let total = 0;
                for (const [key, item] of Object.entries(checked)) {
                    const [nodeId, answer] = key.split('_');
                    const branch = nodes[nodeId]?.[answer];
                    if (branch) total += (Number(branch.costValue) || 0) * (item.qty || 1);
                }
                return total;
            },

            async _resetSession() {
                this._rec.data.session = { path: [], done: false, checked: {} };
                await this._save();
                this._render();
                toast('↺ Diagnóstico reiniciado');
            },

            /* ════════════════════════════════════════════
               EDIT MODE
            ════════════════════════════════════════════ */
            _renderEdit() {
                const cont = document.getElementById('fl_content');
                const nodes = this._rec.data.nodes;
                const ids = Object.keys(nodes);

                const rootOptions = ids.map(id =>
                    `<option value="${id}" ${id === this._rec.data.rootId ? 'selected' : ''}>${esc(nodes[id].question?.slice(0, 40) || id)}</option>`
                ).join('');

                cont.innerHTML = `
      <div class="fl-edit-wrap">
        <div class="fl-rate-box">
          <span class="fl-rate-lbl">💵 Valor padrão hora de trabalho (R$/h)</span>
          <input class="fl-rate-inp" type="number" min="0" step="10"
            value="${this._rec.data.laborRate || 120}"
            oninput="App.activePlugin._rec.data.laborRate=+this.value">
          <span class="fl-rate-unit">/h</span>
        </div>
        <div class="fl-root-row">
          <span class="fl-root-lbl">🚩 Nó raiz (pergunta inicial):</span>
          <select class="fl-root-sel" onchange="App.activePlugin._rec.data.rootId=this.value">
            ${rootOptions}
          </select>
        </div>
        ${ids.map((id, i) => this._editCard(nodes[id], i + 1)).join('')}
        <button class="fl-add-btn" onclick="App.activePlugin._addNode()">+ Adicionar pergunta</button>
      </div>`;
            },

            _editCard(node, num) {
                const BRANCH_TYPES = [
                    { id: 'part', label: '🔩 Peça' },
                    { id: 'labor', label: '🔧 M.O.' },
                    { id: 'none', label: '⊘ Nenhum' },
                ];
                const nodes = this._rec.data.nodes;

                const branchHtml = (answer, label) => {
                    const b = node[answer] || {};
                    const isNext = b.type === 'next';
                    const isResult = b.type === 'result';
                    const otherIds = Object.keys(nodes).filter(id => id !== node.id);
                    const costType = b.costType || 'none';

                    return `
        <div class="fl-branch-box">
          <div class="fl-branch-title">${label}</div>
          <div class="fl-efield">
            <label>Tipo</label>
            <select onchange="App.activePlugin._setBranchType('${node.id}','${answer}',this.value)">
              <option value="next"   ${isNext ? 'selected' : ''}>→ Ir para outra pergunta</option>
              <option value="result" ${isResult ? 'selected' : ''}>⚑ Resultado final</option>
            </select>
          </div>
          ${isNext ? `
            <div class="fl-efield">
              <label>Próxima pergunta</label>
              <select onchange="App.activePlugin._setNextId('${node.id}','${answer}',this.value)">
                ${otherIds.map(id => `<option value="${id}" ${b.nextId === id ? 'selected' : ''}>${esc(nodes[id].question?.slice(0, 40) || id)}</option>`).join('')}
              </select>
            </div>` : ''}
          ${isResult ? `
            <div class="fl-efield">
              <label>Tipo de resultado</label>
              <select onchange="App.activePlugin._setField('${node.id}','${answer}','resultType',this.value)">
                <option value="ok"   ${b.resultType === 'ok' ? 'selected' : ''}>✅ OK / Resolvido</option>
                <option value="warn" ${b.resultType === 'warn' ? 'selected' : ''}>⚠️ Atenção</option>
                <option value="err"  ${b.resultType === 'err' ? 'selected' : ''}>❌ Erro / Defeito</option>
                <option value="info" ${b.resultType === 'info' ? 'selected' : ''}>ℹ️ Informativo</option>
              </select>
            </div>
            <div class="fl-efield">
              <label>Ícone  <span style="opacity:.4;font-size:9px">(emoji)</span></label>
              <input type="text" value="${esc(b.icon || '')}" placeholder="✅ ⚡ 🔋 🔧…"
                oninput="App.activePlugin._setField('${node.id}','${answer}','icon',this.value)">
            </div>
            <div class="fl-efield">
              <label>Título do resultado</label>
              <input type="text" value="${esc(b.title || '')}" placeholder="Ex: Substituir bateria"
                oninput="App.activePlugin._setField('${node.id}','${answer}','title',this.value)">
            </div>
            <div class="fl-efield">
              <label>Descrição</label>
              <textarea rows="2" placeholder="Detalhes do diagnóstico…"
                oninput="App.activePlugin._setField('${node.id}','${answer}','desc',this.value)">${esc(b.desc || '')}</textarea>
            </div>
            <div class="fl-cost-fields">
              <div style="font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">💰 Custo deste resultado</div>
              <div class="fl-cost-type-row">
                ${BRANCH_TYPES.map(t => `
                  <button class="fl-cost-type-btn ${costType === t.id ? 'on' : ''}"
                    onclick="App.activePlugin._setField('${node.id}','${answer}','costType','${t.id}')">
                    ${t.label}
                  </button>`).join('')}
              </div>
              ${costType !== 'none' ? `
                <div class="fl-efield" style="margin-top:6px">
                  <label>Nome da ${costType === 'part' ? 'peça' : 'tarefa'}</label>
                  <input type="text" value="${esc(b.costLabel || b.title || '')}"
                    placeholder="${costType === 'part' ? 'Ex: Bateria 60Ah, Filtro de óleo…' : 'Ex: Troca de óleo, Diagnóstico…'}"
                    oninput="App.activePlugin._setField('${node.id}','${answer}','costLabel',this.value)">
                </div>
                <div class="fl-cost-inline">
                  <div class="fl-efield">
                    <label>Valor (R$)</label>
                    <input type="number" min="0" step="0.01" value="${b.costValue || 0}"
                      oninput="App.activePlugin._setField('${node.id}','${answer}','costValue',+this.value)">
                  </div>
                  <div class="fl-efield">
                    <label>Unidade</label>
                    <select onchange="App.activePlugin._setField('${node.id}','${answer}','costUnit',this.value)">
                      <option value="un"  ${(b.costUnit || 'un') === 'un' ? 'selected' : ''}>un (unidade)</option>
                      <option value="h"   ${b.costUnit === 'h' ? 'selected' : ''}>h (hora)</option>
                      <option value="m"   ${b.costUnit === 'm' ? 'selected' : ''}>m (metro)</option>
                      <option value="kg"  ${b.costUnit === 'kg' ? 'selected' : ''}>kg</option>
                      <option value="l"   ${b.costUnit === 'l' ? 'selected' : ''}>L (litro)</option>
                    </select>
                  </div>
                </div>` : ''}
          ` : ''}
        </div>`;
                };

                return `
      <div class="fl-ecard" id="flecard_${node.id}">
        <div class="fl-ecard-head" onclick="App.activePlugin._toggleCard('${node.id}')">
          <span class="fl-ecard-num">${num}</span>
          <span class="fl-ecard-q">${esc((node.question || '').slice(0, 70))}${(node.question || '').length > 70 ? '…' : ''}</span>
          <span class="fl-ecard-chev">▾</span>
        </div>
        <div class="fl-ecard-body">
          <div class="fl-efield">
            <label>Pergunta</label>
            <textarea rows="2"
              oninput="App.activePlugin._setNodeField('${node.id}','question',this.value)">${esc(node.question || '')}</textarea>
          </div>
          <div class="fl-efield">
            <label>Dica <span style="opacity:.4">(opcional)</span></label>
            <input type="text" value="${esc(node.hint || '')}" placeholder="Ex: Use um multímetro…"
              oninput="App.activePlugin._setNodeField('${node.id}','hint',this.value)">
          </div>
          ${branchHtml('yes', '✅ Se SIM')}
          ${branchHtml('no', '❌ Se NÃO')}
          <div class="fl-ecard-actions">
            <button class="fl-save-btn" onclick="App.activePlugin._saveEdit()">💾 Salvar</button>
            <button class="fl-del-btn" onclick="App.activePlugin._deleteNode('${node.id}')">🗑</button>
          </div>
        </div>
      </div>`;
            },

            _toggleCard(id) {
                document.getElementById('flecard_' + id)?.classList.toggle('open');
            },

            /* live-edit helpers (no save until _saveEdit) */
            _setNodeField(id, field, val) {
                if (this._rec.data.nodes[id]) this._rec.data.nodes[id][field] = val;
            },
            _setBranchType(nodeId, answer, type) {
                const node = this._rec.data.nodes[nodeId]; if (!node) return;
                const old = node[answer] || {};
                node[answer] = type === 'next'
                    ? { type: 'next', nextId: Object.keys(this._rec.data.nodes).find(id => id !== nodeId) || '' }
                    : { type: 'result', resultType: 'ok', icon: '✅', title: '', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '' };
                this._renderEdit();
            },
            _setNextId(nodeId, answer, nextId) {
                const node = this._rec.data.nodes[nodeId]; if (!node) return;
                if (node[answer]) node[answer].nextId = nextId;
            },
            _setField(nodeId, answer, field, val) {
                const node = this._rec.data.nodes[nodeId]; if (!node) return;
                if (!node[answer]) node[answer] = {};
                node[answer][field] = val;
                // re-render edit only when costType changes (affects visible fields)
                if (field === 'costType') this._renderEdit();
            },

            async _saveEdit() {
                const lr = this._el?.querySelector('.fl-rate-inp');
                if (lr) this._rec.data.laborRate = +lr.value || 120;
                await this._save();
                toast('💾 Fluxo salvo!');
                this._renderEdit();
            },

            async _addNode() {
                const id = 'n' + Date.now();
                const ids = Object.keys(this._rec.data.nodes);
                this._rec.data.nodes[id] = {
                    id, type: 'question', question: 'Nova pergunta', hint: '',
                    yes: { type: 'result', resultType: 'ok', icon: '✅', title: 'OK', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '' },
                    no: { type: 'result', resultType: 'err', icon: '❌', title: 'Problema', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '' },
                };
                await this._save();
                this._renderEdit();
                setTimeout(() => {
                    const el = document.getElementById('flecard_' + id);
                    if (el) { el.classList.add('open'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }, 80);
            },

            async _deleteNode(id) {
                const nodes = this._rec.data.nodes;
                if (Object.keys(nodes).length <= 1) { toast('Precisa ter pelo menos 1 nó'); return; }
                delete nodes[id];
                // clear dangling nextId refs
                for (const n of Object.values(nodes)) {
                    for (const ans of ['yes', 'no']) {
                        if (n[ans]?.nextId === id) n[ans] = { type: 'result', resultType: 'ok', icon: '✅', title: 'OK', desc: '', costType: 'none', costValue: 0, costUnit: 'un', costLabel: '' };
                    }
                }
                if (this._rec.data.rootId === id) this._rec.data.rootId = Object.keys(nodes)[0];
                await this._save();
                this._renderEdit();
                toast('Nó removido');
            },

            _setMode(m) { this._mode = m; this._render(); },
        });
    </script>
    <!-- ═══════════════ ▲SCRIPT ═══════════════ -->
    <!-- ════════════════════════════════════════════
     PLUGIN: NOTAS DE ÁUDIO
════════════════════════════════════════════ -->
    <script>
        registerPlugin({

            /* ── Identidade ─────────────────────────── */
            id: 'audio',
            name: 'Notas de Áudio',
            icon: '🎙️',
            color: '#f0516f',

            defaultData: () => ({ clips: [] }),

            /* ── Card na home ───────────────────────── */
            cardPreview(rec) {
                const n = (rec.data.clips || []).length;
                if (!n) return 'Sem gravações ainda';
                const total = (rec.data.clips || []).reduce((s, c) => s + (c.duration || 0), 0);
                return `${n} gravação${n !== 1 ? 's' : ''} · ${this._fmtDur(total)} total`;
            },
            cardBadge(rec) {
                const n = (rec.data.clips || []).length;
                if (!n) return '<span class="badge badge-p">Vazio</span>';
                return `<span class="badge badge-g">🎙️ ${n} clip${n !== 1 ? 's' : ''}</span>`;
            },

            navActions: [{
                id: 'sort', icon: '⇅', title: 'Mais recentes primeiro',
                handler(rec) {
                    const p = App.activePlugin;
                    p._sortAsc = !p._sortAsc;
                    p._render();
                }
            }],

            /* ── Estado interno ─────────────────────── */
            _el: null, _rec: null,
            _mediaRec: null,   // MediaRecorder
            _recState: 'idle', // idle | recording | paused
            _recChunks: [],
            _recSeconds: 0,
            _recTimer: null,
            _waveTimer: null,
            _pendingBlob: null,   // blob waiting to be saved
            _pendingDur: 0,
            _audioCtx: null,
            _analyser: null,
            _srcNode: null,
            _stream: null,
            _playingId: null,
            _audioEl: null,
            _renamingId: null,
            _sortAsc: false,
            _searchQ: '',

            /* ══ HOOKS ══════════════════════════════════ */
            mount(container, rec) {
                this._el = container;
                this._rec = rec;
                this._recState = 'idle';
                this._pendingBlob = null;
                this._playingId = null;
                this._renamingId = null;
                this._searchQ = '';
                this._render();
            },

            unmount() {
                this._stopPlayback();
                this._cancelRec();
                this._el = null;
                this._rec = null;
            },

            /* ── save ───────────────────────────────── */
            async _save() { await App.saveRecord(this._rec); },

            /* ════════════════════════════════════════════
               RENDER
            ════════════════════════════════════════════ */
            _render() {
                if (!this._el) return;
                const clips = this._rec.data.clips || [];
                const n = clips.length;

                document.getElementById('pluginNavSub').textContent =
                    `${n} gravação${n !== 1 ? 's' : ''} · ${this._fmtDur(clips.reduce((s, c) => s + (c.duration || 0), 0))} total`;

                this._el.innerHTML = `
      <div class="au-wrap">

        ${/* ── search ── */ ''}
        <div class="au-search-row">
          <div class="au-search-wrap">
            <span class="au-search-ico">🔍</span>
            <input class="au-search" id="au_search" type="text"
              placeholder="Pesquisar gravações…"
              value="${esc(this._searchQ)}"
              oninput="App.activePlugin._onSearch(this.value)">
          </div>
        </div>

        ${/* ── recorder zone ── */ ''}
        <div class="au-rec-zone">
          ${this._recState === 'idle' && !this._pendingBlob ? `
            <button class="au-rec-btn idle" onclick="App.activePlugin._startRec()">
              <span class="au-rec-ico">🎙️</span>
            </button>
            <span class="au-timer">00:00</span>
            <span class="au-rec-label">Toque para gravar</span>
          ` : this._recState !== 'idle' ? `
            <div class="au-wave-row" id="au_wave">
              ${Array.from({ length: 20 }, (_, i) => `<div class="au-wave-bar" id="aubar_${i}" style="height:${4 + Math.random() * 20}px"></div>`).join('')}
            </div>
            <span class="au-timer ${this._recState}" id="au_timer">${this._fmtSec(this._recSeconds)}</span>
            <div class="au-ctrl-row">
              ${this._recState === 'recording' ? `
                <button class="au-ctrl-btn" onclick="App.activePlugin._pauseRec()">⏸ Pausar</button>
              ` : `
                <button class="au-ctrl-btn" onclick="App.activePlugin._resumeRec()">▶ Continuar</button>
              `}
              <button class="au-ctrl-btn" onclick="App.activePlugin._stopRec()">⏹ Salvar</button>
              <button class="au-ctrl-btn danger" onclick="App.activePlugin._cancelRec()">✕</button>
            </div>
          ` : ''}

          ${/* ── pending save ── */ this._pendingBlob ? `
            <div class="au-save-box">
              <div class="au-save-title">💾 Salvar gravação · ${this._fmtSec(this._pendingDur)}</div>
              <div class="au-save-row">
                <input class="au-save-inp" id="au_pending_title" type="text"
                  placeholder="Nome da gravação…" value=""
                  onkeydown="if(event.key==='Enter')App.activePlugin._saveClip()">
                <button class="au-save-btn" onclick="App.activePlugin._saveClip()">Salvar</button>
                <button class="au-discard-btn" onclick="App.activePlugin._discardPending()">✕</button>
              </div>
            </div>
          ` : ''}
        </div>

        ${/* ── list ── */ ''}
        ${n === 0 ? `
          <div class="au-empty">
            <span class="ico">🎙️</span>
            <h3>Nenhuma gravação</h3>
            <p>Toque no botão acima para gravar sua primeira nota de áudio.</p>
          </div>
        ` : `
          <p class="au-section-lbl">Gravações</p>
          <div class="au-list">
            ${this._filteredClips().map((clip, i) => this._clipCard(clip, i)).join('')}
          </div>
          <div style="height:16px"></div>
        `}
      </div>`;

                /* restart live waveform if recording */
                if (this._recState !== 'idle') this._startWaveAnim();
                /* focus pending title */
                if (this._pendingBlob) {
                    setTimeout(() => document.getElementById('au_pending_title')?.focus(), 80);
                }
            },

            _clipCard(clip, i) {
                const isPlaying = this._playingId === clip.id;
                const isRenaming = this._renamingId === clip.id;
                const date = new Date(clip.createdAt).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

                return `
      <div class="au-card" style="animation-delay:${i * .04}s" id="aucard_${clip.id}">
        <div class="au-card-head">
          <button class="au-play-btn ${isPlaying ? 'playing' : 'idle'}"
            onclick="App.activePlugin._togglePlay('${clip.id}')">
            ${isPlaying ? '⏸' : '▶'}
          </button>
          <div class="au-card-info">
            <div class="au-card-title">${esc(clip.title || 'Sem título')}</div>
            <div class="au-card-meta">${this._fmtDur(clip.duration)} · ${date}</div>
          </div>
          <button class="au-card-del" onclick="App.activePlugin._renameStart('${clip.id}')" title="Renomear" style="font-size:13px;">✏️</button>
          <button class="au-card-del" onclick="App.activePlugin._deleteClip('${clip.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>

        ${isRenaming ? `
          <div class="au-rename-row">
            <input class="au-rename-inp" id="au_rename_inp" type="text"
              value="${esc(clip.title || '')}" placeholder="Nome…"
              onkeydown="if(event.key==='Enter')App.activePlugin._renameSave('${clip.id}')">
            <button class="au-rename-ok" onclick="App.activePlugin._renameSave('${clip.id}')">OK</button>
          </div>
        ` : ''}

        ${isPlaying ? `
          <div class="au-player">
            <input class="au-seek-track" id="au_seek" type="range" min="0" max="100" value="0"
              oninput="App.activePlugin._seek(this.value)">
            <div class="au-time-row">
              <span id="au_cur">0:00</span>
              <span>${this._fmtDur(clip.duration)}</span>
            </div>
          </div>
        ` : ''}
      </div>`;
            },

            /* ════════════════════════════════════════════
               RECORDER
            ════════════════════════════════════════════ */
            async _startRec() {
                try {
                    this._stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (e) {
                    toast('Microfone não autorizado'); return;
                }

                /* Web Audio analyser for waveform */
                this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this._analyser = this._audioCtx.createAnalyser();
                this._analyser.fftSize = 64;
                this._srcNode = this._audioCtx.createMediaStreamSource(this._stream);
                this._srcNode.connect(this._analyser);

                const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus'
                    : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';

                this._mediaRec = new MediaRecorder(this._stream, mime ? { mimeType: mime } : {});
                this._recChunks = [];
                this._recSeconds = 0;

                this._mediaRec.ondataavailable = e => { if (e.data.size > 0) this._recChunks.push(e.data); };
                this._mediaRec.onstop = () => this._onRecStop();

                this._mediaRec.start(100);
                this._recState = 'recording';
                this._startTimer();
                this._render();
            },

            _pauseRec() {
                if (this._mediaRec?.state === 'recording') {
                    this._mediaRec.pause();
                    this._recState = 'paused';
                    this._stopTimer();
                    this._render();
                }
            },

            _resumeRec() {
                if (this._mediaRec?.state === 'paused') {
                    this._mediaRec.resume();
                    this._recState = 'recording';
                    this._startTimer();
                    this._render();
                }
            },

            _stopRec() {
                if (this._mediaRec && this._mediaRec.state !== 'inactive') {
                    this._mediaRec.stop();
                    this._stopTimer();
                    this._stopWaveAnim();
                    this._stream?.getTracks().forEach(t => t.stop());
                }
            },

            _cancelRec() {
                this._stopTimer();
                this._stopWaveAnim();
                if (this._mediaRec && this._mediaRec.state !== 'inactive') {
                    this._mediaRec.onstop = null;
                    this._mediaRec.stop();
                }
                this._stream?.getTracks().forEach(t => t.stop());
                this._audioCtx?.close();
                this._recState = 'idle';
                this._recChunks = [];
                this._pendingBlob = null;
                this._render();
            },

            _onRecStop() {
                const mime = this._mediaRec?.mimeType || 'audio/webm';
                this._pendingBlob = new Blob(this._recChunks, { type: mime });
                this._pendingDur = this._recSeconds;
                this._recState = 'idle';
                this._recChunks = [];
                this._audioCtx?.close();
                this._render();
            },

            /* timer */
            _startTimer() {
                this._recTimer = setInterval(() => {
                    this._recSeconds++;
                    const el = document.getElementById('au_timer');
                    if (el) el.textContent = this._fmtSec(this._recSeconds);
                }, 1000);
            },
            _stopTimer() { clearInterval(this._recTimer); },

            /* live waveform animation */
            _startWaveAnim() {
                if (!this._analyser) return;
                const data = new Uint8Array(this._analyser.frequencyBinCount);
                const tick = () => {
                    if (this._recState === 'idle') return;
                    this._analyser.getByteFrequencyData(data);
                    for (let i = 0; i < 20; i++) {
                        const bar = document.getElementById('aubar_' + i);
                        if (bar) {
                            const v = this._recState === 'paused'
                                ? 4
                                : 4 + (data[Math.floor(i * data.length / 20)] / 255) * 32;
                            bar.style.height = v + 'px';
                        }
                    }
                    this._waveTimer = requestAnimationFrame(tick);
                };
                this._waveTimer = requestAnimationFrame(tick);
            },
            _stopWaveAnim() { cancelAnimationFrame(this._waveTimer); },

            /* save pending blob */
            async _saveClip() {
                if (!this._pendingBlob) return;
                const inp = document.getElementById('au_pending_title');
                const title = inp?.value.trim() || `Gravação ${new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;

                /* store blob as base64 inside IDB record */
                const base64 = await this._blobToBase64(this._pendingBlob);
                const clip = {
                    id: 'c' + Date.now(),
                    title,
                    duration: this._pendingDur,
                    mime: this._pendingBlob.type,
                    data: base64,
                    createdAt: Date.now(),
                };

                this._rec.data.clips.unshift(clip);
                this._pendingBlob = null;
                await this._save();
                this._render();
                toast('🎙️ Gravação salva!');
            },

            _discardPending() {
                this._pendingBlob = null;
                this._render();
                toast('Gravação descartada');
            },

            /* ════════════════════════════════════════════
               PLAYBACK
            ════════════════════════════════════════════ */
            _togglePlay(id) {
                if (this._playingId === id) {
                    this._stopPlayback();
                    return;
                }
                this._stopPlayback();
                const clip = this._rec.data.clips.find(c => c.id === id);
                if (!clip) return;

                const audio = new Audio(clip.data);
                this._audioEl = audio;
                this._playingId = id;
                this._render();

                audio.ontimeupdate = () => {
                    const seek = document.getElementById('au_seek');
                    const cur = document.getElementById('au_cur');
                    if (!audio.duration) return;
                    if (seek) seek.value = (audio.currentTime / audio.duration * 100).toFixed(1);
                    if (cur) cur.textContent = this._fmtDur(Math.floor(audio.currentTime));
                };
                audio.onended = () => { this._playingId = null; this._audioEl = null; this._render(); };
                audio.onerror = () => { toast('Erro ao reproduzir'); this._stopPlayback(); };
                audio.play().catch(() => toast('Erro ao reproduzir'));
            },

            _stopPlayback() {
                if (this._audioEl) {
                    this._audioEl.pause();
                    this._audioEl.onended = null;
                    this._audioEl.ontimeupdate = null;
                    this._audioEl = null;
                }
                const prev = this._playingId;
                this._playingId = null;
                if (prev) this._render();
            },

            _seek(pct) {
                if (this._audioEl && this._audioEl.duration) {
                    this._audioEl.currentTime = (pct / 100) * this._audioEl.duration;
                }
            },

            /* ════════════════════════════════════════════
               SEARCH / SORT / RENAME / DELETE
            ════════════════════════════════════════════ */
            _onSearch(q) {
                this._searchQ = q;
                const list = document.querySelector('.au-list');
                if (!list) return;
                // re-render just the list section for perf
                list.innerHTML = this._filteredClips().map((c, i) => this._clipCard(c, i)).join('');
            },

            _filteredClips() {
                const clips = [...(this._rec.data.clips || [])];
                if (!this._sortAsc) clips.sort((a, b) => b.createdAt - a.createdAt);
                else clips.sort((a, b) => a.createdAt - b.createdAt);
                const q = this._searchQ.toLowerCase().trim();
                if (!q) return clips;
                return clips.filter(c => (c.title || '').toLowerCase().includes(q));
            },

            _renameStart(id) {
                this._stopPlayback();
                this._renamingId = id;
                this._render();
                setTimeout(() => document.getElementById('au_rename_inp')?.focus(), 60);
            },

            async _renameSave(id) {
                const inp = document.getElementById('au_rename_inp');
                const val = inp?.value.trim();
                if (!val) return;
                const clip = this._rec.data.clips.find(c => c.id === id);
                if (clip) clip.title = val;
                this._renamingId = null;
                await this._save();
                this._render();
                toast('✏️ Renomeado');
            },

            async _deleteClip(id) {
                this._stopPlayback();
                this._rec.data.clips = this._rec.data.clips.filter(c => c.id !== id);
                await this._save();
                this._render();
                toast('Gravação removida');
            },

            /* ── utils ──────────────────────────────── */
            _fmtSec(s) {
                const m = Math.floor(s / 60), sec = s % 60;
                return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            },
            _fmtDur(s) {
                s = Math.round(s || 0);
                if (s < 60) return `${s}s`;
                const m = Math.floor(s / 60), sec = s % 60;
                return sec ? `${m}m ${sec}s` : `${m}m`;
            },
            _blobToBase64(blob) {
                return new Promise((res, rej) => {
                    const r = new FileReader();
                    r.onload = () => res(r.result);
                    r.onerror = () => rej(r.error);
                    r.readAsDataURL(blob);
                });
            },
        });
    </script>

    <!-- ════════════════════════════════════════════
     PLUGIN: QUIZ
════════════════════════════════════════════ -->
    <script>
        registerPlugin({

            /* ── Identidade ─────────────────────────── */
            id: 'quiz',
            name: 'Quiz',
            icon: '🧠',
            color: '#f0a030',

            defaultData: () => ({
                questions: [
                    {
                        id: 'q1', question: 'Qual é a capital do Brasil?',
                        hint: '', options: ['Brasília', 'São Paulo', 'Rio de Janeiro', 'Salvador'],
                        correct: 0, explanation: 'Brasília é a capital federal desde 1960.'
                    },
                    {
                        id: 'q2', question: 'Quanto é 7 × 8?',
                        hint: 'Pense em tabuada', options: ['54', '56', '58', '64'],
                        correct: 1, explanation: '7 × 8 = 56.'
                    },
                ],
                history: [],   // [{date, score, total, pct, answers:[{qId,chosen,correct}]}]
            }),

            /* ── Card na home ───────────────────────── */
            cardPreview(rec) {
                const n = (rec.data.questions || []).length;
                const h = rec.data.history || [];
                const best = h.length ? Math.max(...h.map(r => r.pct)) : null;
                return `${n} pergunta${n !== 1 ? 's' : ''} · ${h.length} sessão${h.length !== 1 ? 's' : ''}`
                    + (best !== null ? ` · 🏆 ${best}%` : '');
            },
            cardBadge(rec) {
                const h = rec.data.history || [];
                if (!h.length) return '<span class="badge badge-p">Novo</span>';
                const best = Math.max(...h.map(r => r.pct));
                if (best >= 80) return `<span class="badge badge-g">🏆 ${best}%</span>`;
                if (best >= 50) return `<span class="badge badge-a">📈 ${best}%</span>`;
                return `<span class="badge badge-p">📚 ${best}%</span>`;
            },

            navActions: [
                {
                    id: 'shuffle', icon: '🔀', title: 'Embaralhar perguntas',
                    handler() { App.activePlugin._shufflePlay(); }
                },
                {
                    id: 'reset', icon: '↺', title: 'Nova sessão',
                    handler() { App.activePlugin._newSession(); }
                },
            ],

            /* ── Estado interno ─────────────────────── */
            _el: null, _rec: null,
            _mode: 'play',   // play | results | edit
            _editSearch: '',
            _session: null,
            /* session = { questions:[...shuffled], current:0, answers:[{qId,chosen,correct}], answered:bool } */

            /* ══ HOOKS ══════════════════════════════════ */
            mount(container, rec) {
                this._el = container;
                this._rec = rec;
                this._mode = 'play';
                this._initSession(false);
                this._render();
            },
            unmount() { this._el = null; this._rec = null; this._session = null; },

            async _save() { await App.saveRecord(this._rec); },

            /* ── session helpers ────────────────────── */
            _initSession(shuffle) {
                let qs = [...(this._rec.data.questions || [])];
                if (shuffle) qs = this._shuffle(qs);
                this._session = { questions: qs, current: 0, answers: [], answered: false };
            },
            _shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; }
                return a;
            },
            _shufflePlay() {
                this._initSession(true);
                this._mode = 'play';
                this._render();
                toast('🔀 Perguntas embaralhadas!');
            },
            _newSession() {
                this._initSession(false);
                this._mode = 'play';
                this._render();
            },

            /* ════════════════════════════════════════════
               MAIN RENDER
            ════════════════════════════════════════════ */
            _render() {
                if (!this._el) return;
                const qs = this._rec.data.questions || [];
                const hist = this._rec.data.history || [];

                // nav subtitle
                const best = hist.length ? Math.max(...hist.map(r => r.pct)) : null;
                document.getElementById('pluginNavSub').textContent =
                    `${qs.length} pergunta${qs.length !== 1 ? 's' : ''}`
                    + (best !== null ? ` · 🏆 ${best}%` : '');

                // build stats
                const totalSessions = hist.length;
                const avgPct = hist.length ? Math.round(hist.reduce((s, h) => s + h.pct, 0) / hist.length) : 0;
                const bestPct = best ?? 0;
                const streak = this._calcStreak();

                this._el.innerHTML = `
      <div class="qz-wrap">

        <div class="qz-stats">
          <div class="qz-stat acc">
            <div class="qz-stat-val">${qs.length}</div>
            <div class="qz-stat-lbl">Perguntas</div>
          </div>
          <div class="qz-stat ${bestPct >= 80 ? 'green' : bestPct >= 50 ? 'amber' : ''}">
            <div class="qz-stat-val">${bestPct}%</div>
            <div class="qz-stat-lbl">Melhor</div>
          </div>
          <div class="qz-stat ${avgPct >= 70 ? 'green' : ''}">
            <div class="qz-stat-val">${avgPct}%</div>
            <div class="qz-stat-lbl">Média</div>
          </div>
          <div class="qz-stat ${streak >= 3 ? 'green' : ''}">
            <div class="qz-stat-val">${streak}🔥</div>
            <div class="qz-stat-lbl">Sequência</div>
          </div>
        </div>

        <div class="qz-tabs">
          <button class="qz-tab ${this._mode !== 'edit' ? 'on' : ''}"
            onclick="App.activePlugin._setMode('play')">▶ Jogar</button>
          <button class="qz-tab ${this._mode === 'edit' ? 'on' : ''}"
            onclick="App.activePlugin._setMode('edit')">✏️ Editar</button>
        </div>

        <div id="qz_content"></div>
        <div style="height:16px"></div>
      </div>`;

                if (this._mode === 'results') this._renderResults();
                else if (this._mode === 'edit') this._renderEdit();
                else this._renderPlay();
            },

            /* ════════════════════════════════════════════
               PLAY MODE
            ════════════════════════════════════════════ */
            _renderPlay() {
                const cont = document.getElementById('qz_content');
                const sess = this._session;
                if (!sess || !sess.questions.length) {
                    cont.innerHTML = `<div class="empty" style="padding:30px 10px"><span class="ico">🧠</span><h3>Sem perguntas</h3><p>Vá em Editar para adicionar perguntas ao quiz.</p></div>`;
                    return;
                }

                const total = sess.questions.length;
                const cur = sess.current;
                const pct = Math.round(cur / total * 100);
                const q = sess.questions[cur];
                const ans = sess.answers.find(a => a.qId === q?.id);

                cont.innerHTML = `
      <div class="qz-prog-wrap">
        <div class="qz-prog-row">
          <span>${cur} de ${total} respondidas</span>
          <span>${pct}%</span>
        </div>
        <div class="qz-prog-track">
          <div class="qz-prog-bar" style="width:${pct}%"></div>
        </div>
      </div>

      ${q ? this._questionCard(q, cur + 1, total, ans) : ''}

      ${ans ? `
        <div class="qz-feedback ${ans.correct ? 'ok' : 'ko'}">
          <span class="qz-fb-ico">${ans.correct ? '🎉' : '❌'}</span>
          <div class="qz-fb-text">
            <div class="qz-fb-title ${ans.correct ? 'ok' : 'ko'}">${ans.correct ? 'Correto!' : 'Errado!'}</div>
            ${q.explanation ? `<div class="qz-fb-desc">${esc(q.explanation)}</div>` : ''}
          </div>
        </div>
        <button class="qz-next-btn" onclick="App.activePlugin._next()">
          ${cur + 1 < total ? 'Próxima →' : '🏁 Ver resultado'}
        </button>
      ` : ''}`;
            },

            _questionCard(q, num, total, ans) {
                const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];
                const opts = (q.options || []).map((opt, i) => {
                    let cls = '';
                    if (ans) {
                        if (i === q.correct) cls = ans.chosen === i ? 'correct' : 'reveal';
                        if (i === ans.chosen && ans.chosen !== q.correct) cls = 'wrong';
                    }
                    return `
        <button class="qz-opt ${cls}" ${ans ? 'disabled' : ''}
          onclick="App.activePlugin._answer('${q.id}',${i})">
          <span class="qz-opt-letter">${LETTERS[i] || i + 1}</span>
          ${esc(opt)}
        </button>`;
                }).join('');

                return `
      <div class="qz-qcard">
        <div class="qz-qnum">Pergunta ${num} / ${total}</div>
        <div class="qz-question">${esc(q.question)}</div>
        ${q.hint ? `<div class="qz-hint">💡 ${esc(q.hint)}</div>` : ''}
      </div>
      <div class="qz-opts">${opts}</div>`;
            },

            _answer(qId, chosen) {
                const sess = this._session;
                const q = sess.questions.find(x => x.id === qId);
                if (!q || sess.answers.find(a => a.qId === qId)) return;
                sess.answers.push({ qId, chosen, correct: chosen === q.correct });
                sess.answered = true;
                this._renderPlay();
                this._el.querySelector('.qz-opts')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            },

            _next() {
                const sess = this._session;
                sess.current++;
                sess.answered = false;
                if (sess.current >= sess.questions.length) {
                    this._finishSession();
                } else {
                    this._renderPlay();
                    this._el.closest('.view-scroll')?.scrollTo({ top: 0, behavior: 'smooth' });
                }
            },

            async _finishSession() {
                const sess = this._session;
                const score = sess.answers.filter(a => a.correct).length;
                const total = sess.questions.length;
                const pct = Math.round(score / total * 100);
                const entry = {
                    date: Date.now(),
                    score, total, pct,
                    answers: sess.answers,
                };
                this._rec.data.history.unshift(entry);
                if (this._rec.data.history.length > 50) this._rec.data.history.length = 50;
                await this._save();
                this._mode = 'results';
                this._render();
            },

            /* ════════════════════════════════════════════
               RESULTS SCREEN
            ════════════════════════════════════════════ */
            _renderResults() {
                const cont = document.getElementById('qz_content');
                const last = this._rec.data.history[0];
                if (!last) { this._mode = 'play'; this._renderPlay(); return; }

                const { score, total, pct, answers } = last;
                const msg =
                    pct === 100 ? '🏆 Perfeito! Você gabaritou!' :
                        pct >= 80 ? '🎉 Excelente resultado!' :
                            pct >= 60 ? '👍 Bom trabalho! Continue!' :
                                pct >= 40 ? '📚 Continue estudando!' :
                                    '💪 Não desanime, tente novamente!';

                const r = 46, circ = 2 * Math.PI * r;
                const dash = circ - (pct / 100) * circ;

                const breakdown = answers.map(a => {
                    const q = (this._rec.data.questions || []).find(x => x.id === a.qId);
                    if (!q) return '';
                    return `<div class="qz-result-row">
        <span class="qz-result-q">${esc(q.question.slice(0, 60))}${q.question.length > 60 ? '…' : ''}</span>
        <span class="qz-result-mark ${a.correct ? 'ok' : 'ko'}">${a.correct ? '✓' : '✕'}</span>
      </div>`;
                }).join('');

                cont.innerHTML = `
      <div class="qz-result-screen">
        <div class="qz-result-ring">
          <svg width="110" height="110">
            <circle cx="55" cy="55" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="10"/>
            <circle cx="55" cy="55" r="${r}" fill="none"
              stroke="${pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)'}"
              stroke-width="10" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${dash}"
              style="transition:stroke-dashoffset .8s cubic-bezier(.34,1.3,.64,1)"/>
          </svg>
          <div class="qz-result-pct">${pct}%</div>
        </div>
        <div class="qz-result-title">${score} / ${total} corretas</div>
        <div class="qz-result-sub">${msg}</div>

        <div class="qz-result-breakdown">${breakdown}</div>

        <button class="qz-restart-btn" onclick="App.activePlugin._newSession()">
          ▶ Jogar novamente
        </button>
        <button class="qz-retry-btn"
          onclick="App.activePlugin._retryWrong()">
          🔁 Repetir erradas (${answers.filter(a => !a.correct).length})
        </button>
      </div>`;
            },

            _retryWrong() {
                const last = this._rec.data.history[0];
                if (!last) return;
                const wrongIds = last.answers.filter(a => !a.correct).map(a => a.qId);
                const wrongQs = (this._rec.data.questions || []).filter(q => wrongIds.includes(q.id));
                if (!wrongQs.length) { toast('Nenhuma errada!'); return; }
                this._session = { questions: this._shuffle(wrongQs), current: 0, answers: [], answered: false };
                this._mode = 'play';
                this._render();
                toast(`🔁 ${wrongQs.length} pergunta${wrongQs.length !== 1 ? 's' : ''} para revisar`);
            },

            /* ════════════════════════════════════════════
               EDIT MODE
            ════════════════════════════════════════════ */
            _renderEdit() {
                const cont = document.getElementById('qz_content');
                const qs = this._rec.data.questions || [];
                const q = this._editSearch.toLowerCase();
                const filtered = q ? qs.filter(x => x.question.toLowerCase().includes(q)) : qs;

                cont.innerHTML = `
      <div class="qz-edit-wrap">

        <!-- import box -->
        <div class="qz-import-box">
          <div class="qz-import-title">📥 Importar perguntas</div>
          <div class="qz-import-hint">Cole perguntas no formato: uma por linha.<br>
            <code style="font-size:11px;color:var(--acc2)">Pergunta | Op1 | Op2 | Op3 | Op4 | índice_correto(0-3) | explicação</code>
          </div>
          <textarea class="qz-import-ta" id="qz_import_ta"
            placeholder="Qual é a capital da França? | Paris | Londres | Roma | Berlim | 0 | Paris é a capital…"></textarea>
          <button class="qz-import-btn" onclick="App.activePlugin._importLines()">
            Importar
          </button>
        </div>

        <input class="qz-edit-search" type="text"
          placeholder="🔍 Buscar pergunta…"
          value="${esc(this._editSearch)}"
          oninput="App.activePlugin._editSearch=this.value;App.activePlugin._renderEdit()">

        <p class="section-label" style="margin:6px 0 8px">${filtered.length} pergunta${filtered.length !== 1 ? 's' : ''}</p>

        ${filtered.map((q, i) => this._editCard(q, i)).join('')}

        <button class="qz-add-q-btn" onclick="App.activePlugin._addQuestion()">
          + Adicionar pergunta
        </button>
      </div>`;
            },

            _editCard(q, idx) {
                const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];
                const opts = (q.options || []).map((o, i) => `
      <div class="qz-opt-edit-row">
        <button class="qz-opt-correct-btn ${i === q.correct ? 'on' : ''}"
          onclick="App.activePlugin._setCorrect('${q.id}',${i})"
          title="Marcar como correta">${i === q.correct ? '✓' : LETTERS[i]}</button>
        <input class="qz-opt-edit-inp" type="text" value="${esc(o)}"
          placeholder="Opção ${LETTERS[i]}…"
          oninput="App.activePlugin._setOpt('${q.id}',${i},this.value)">
      </div>`).join('');

                return `
      <div class="qz-ecard" id="qzecard_${q.id}">
        <div class="qz-ecard-head" onclick="App.activePlugin._toggleECard('${q.id}')">
          <span class="qz-ecard-num">${idx + 1}</span>
          <span class="qz-ecard-q">${esc(q.question.slice(0, 70))}${q.question.length > 70 ? '…' : ''}</span>
          <span class="qz-ecard-chevron">▾</span>
        </div>
        <div class="qz-ecard-body">
          <div class="qz-efield">
            <label>Pergunta</label>
            <textarea rows="2"
              oninput="App.activePlugin._setQField('${q.id}','question',this.value)">${esc(q.question)}</textarea>
          </div>
          <div class="qz-efield">
            <label>Dica <span style="opacity:.4">(opcional)</span></label>
            <input type="text" value="${esc(q.hint || '')}" placeholder="Ex: Pense na tabuada…"
              oninput="App.activePlugin._setQField('${q.id}','hint',this.value)">
          </div>
          <div class="qz-efield">
            <label>Opções <span style="opacity:.5;font-size:10px">· ✓ marca a correta</span></label>
            <div class="qz-opts-edit" id="qzopts_${q.id}">${opts}</div>
            <button class="qz-add-opt-btn"
              onclick="App.activePlugin._addOpt('${q.id}')">+ opção</button>
          </div>
          <div class="qz-efield">
            <label>Explicação <span style="opacity:.4">(exibida após responder)</span></label>
            <textarea rows="2" placeholder="Por que esta é a resposta correta?"
              oninput="App.activePlugin._setQField('${q.id}','explanation',this.value)">${esc(q.explanation || '')}</textarea>
          </div>
          <div class="qz-ecard-actions">
            <button class="qz-save-btn" onclick="App.activePlugin._saveEdit()">💾 Salvar</button>
            <button class="qz-del-btn" onclick="App.activePlugin._delQuestion('${q.id}')">🗑</button>
          </div>
        </div>
      </div>`;
            },

            _toggleECard(id) {
                document.getElementById('qzecard_' + id)?.classList.toggle('open');
            },

            /* edit mutations (live, no save needed until _saveEdit) */
            _setQField(id, field, val) {
                const q = (this._rec.data.questions || []).find(x => x.id === id);
                if (q) q[field] = val;
            },
            _setOpt(id, idx, val) {
                const q = (this._rec.data.questions || []).find(x => x.id === id);
                if (q?.options) q.options[idx] = val;
            },
            _setCorrect(id, idx) {
                const q = (this._rec.data.questions || []).find(x => x.id === id);
                if (!q) return;
                q.correct = idx;
                /* update button visuals */
                const wrap = document.getElementById('qzopts_' + id);
                if (wrap) {
                    wrap.querySelectorAll('.qz-opt-correct-btn').forEach((btn, i) => {
                        btn.classList.toggle('on', i === idx);
