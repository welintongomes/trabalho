        /* audio list */
        .au-section-lbl {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            margin: 14px 0 8px;
        }

        .au-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        /* audio card */
        .au-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            animation: up .22s ease both;
        }

        .au-card-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px 10px;
        }

        .au-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all .13s;
        }

        .au-play-btn.idle {
            background: rgba(110, 92, 245, .15);
            color: var(--acc2);
        }

        .au-play-btn.playing {
            background: var(--acc);
            color: #fff;
            box-shadow: 0 4px 14px var(--acc-glow);
        }

        .au-play-btn:hover {
            transform: scale(1.08);
        }

        .au-card-info {
            flex: 1;
            min-width: 0;
        }

        .au-card-title {
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .au-card-meta {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .au-card-del {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .13s, color .13s;
            flex-shrink: 0;
        }

        .au-card-del:hover {
            background: var(--red-bg);
            color: var(--red);
        }

        /* inline player */
        .au-player {
            padding: 0 14px 12px;
        }

        .au-seek-track {
            width: 100%;
            height: 4px;
            background: var(--bg3);
            border-radius: 4px;
            cursor: pointer;
            appearance: none;
            outline: none;
            margin-bottom: 6px;
        }

        .au-seek-track::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--acc);
            border-radius: 50%;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 2px 6px var(--acc-glow);
        }

        .au-seek-track::-webkit-slider-runnable-track {
            height: 4px;
            background: transparent;
        }

        .au-time-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text3);
        }

        /* rename inline */
        .au-rename-row {
            display: flex;
            gap: 6px;
            padding: 0 14px 12px;
        }

        .au-rename-inp {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--acc);
            border-radius: 9px;
            padding: 8px 11px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13.5px;
            outline: none;
        }

        .au-rename-ok {
            padding: 8px 13px;
            border-radius: 9px;
            background: var(--acc);
            border: none;
            color: #fff;
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* empty */
        .au-empty {
            text-align: center;
            padding: 36px 20px;
            animation: up .3s ease both;
        }

        .au-empty .ico {
            font-size: 44px;
            display: block;
            margin-bottom: 12px;
        }

        .au-empty h3 {
            font-family: var(--fd);
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .au-empty p {
            font-size: 13px;
            color: var(--text3);
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════
   PLUGIN: QUIZ
═══════════════════════════════════════════ */
        .qz-wrap {
            padding: 14px 18px 0;
        }

        /* ── tabs ── */
        .qz-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .qz-tab {
            flex: 1;
            padding: 9px 0;
            border-radius: 11px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
        }

        .qz-tab.on {
            background: var(--acc);
            border-color: var(--acc);
            color: #fff;
            box-shadow: 0 4px 14px var(--acc-glow);
        }

        /* ── stats strip ── */
        .qz-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .qz-stat {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 8px;
            text-align: center;
        }

        .qz-stat-val {
            font-family: var(--fd);
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .qz-stat-lbl {
            font-size: 10px;
            color: var(--text3);
            margin-top: 3px;
            line-height: 1.3;
        }

        .qz-stat.green .qz-stat-val {
            color: var(--green);
        }

        .qz-stat.red .qz-stat-val {
            color: var(--red);
        }

        .qz-stat.amber .qz-stat-val {
            color: var(--amber);
        }

        .qz-stat.acc .qz-stat-val {
            color: var(--acc2);
        }

        /* ── play mode ── */
        .qz-prog-wrap {
            margin-bottom: 16px;
        }

        .qz-prog-row {
            display: flex;
            justify-content: space-between;
            font-size: 11.5px;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .qz-prog-track {
            background: var(--bg3);
            border-radius: 6px;
            height: 5px;
            overflow: hidden;
        }

        .qz-prog-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--acc), #5bf5c4);
            border-radius: 6px;
            transition: width .5s cubic-bezier(.34, 1.56, .64, 1);
        }

        /* question card */
        .qz-qcard {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px;
            animation: qzIn .3s cubic-bezier(.34, 1.3, .64, 1) both;
        }

        @keyframes qzIn {
            from {
                opacity: 0;
                transform: scale(.96) translateY(10px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .qz-qnum {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 10px;
        }

        .qz-question {
            font-family: var(--fd);
            font-size: 19px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .qz-hint {
            font-size: 12.5px;
            color: var(--text3);
            margin-bottom: 0;
            line-height: 1.5;
        }

        /* options */
        .qz-opts {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .qz-opt {
            padding: 14px 16px;
            border-radius: 13px;
            border: 1.5px solid var(--border2);
            background: var(--bg2);
            color: var(--text);
            font-family: var(--fb);
            font-size: 14.5px;
            text-align: left;
            cursor: pointer;
            transition: all .16s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qz-opt:hover:not([disabled]) {
            border-color: var(--acc2);
            background: rgba(110, 92, 245, .08);
            transform: translateX(3px);
        }

        .qz-opt[disabled] {
            cursor: default;
        }

        .qz-opt.correct {
            border-color: var(--green) !important;
            background: var(--green-bg) !important;
            color: var(--green);
            animation: bounce .3s ease;
        }

        .qz-opt.wrong {
            border-color: var(--red) !important;
            background: var(--red-bg) !important;
            color: var(--red);
            animation: shake .3s ease;
        }

        .qz-opt.reveal {
            border-color: var(--green) !important;
            background: var(--green-bg) !important;
            opacity: .6;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scale(1)
            }

            40% {
                transform: scale(1.04)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-6px)
            }

            75% {
                transform: translateX(6px)
            }
        }

        .qz-opt-letter {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--surf2);
            font-family: var(--fd);
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text3);
        }

        .qz-opt.correct .qz-opt-letter {
            background: var(--green);
            color: #fff;
        }

        .qz-opt.wrong .qz-opt-letter {
            background: var(--red);
            color: #fff;
        }

        .qz-opt.reveal .qz-opt-letter {
            background: var(--green);
            color: #fff;
        }

        /* feedback bar */
        .qz-feedback {
            border-radius: 13px;
            padding: 13px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: qzIn .25s ease both;
        }

        .qz-feedback.ok {
            background: var(--green-bg);
            border: 1px solid rgba(62, 207, 122, .25);
        }

        .qz-feedback.ko {
            background: var(--red-bg);
            border: 1px solid rgba(240, 95, 95, .25);
        }

        .qz-fb-ico {
            font-size: 24px;
            flex-shrink: 0;
        }

        .qz-fb-text {
            flex: 1;
        }

        .qz-fb-title {
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
        }

        .qz-fb-title.ok {
            color: var(--green);
        }

        .qz-fb-title.ko {
            color: var(--red);
        }

        .qz-fb-desc {
            font-size: 12.5px;
            color: var(--text2);
            margin-top: 2px;
            line-height: 1.5;
        }

        .qz-next-btn {
            padding: 14px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--acc), #9e8cfb);
            border: none;
            color: #fff;
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--acc-glow);
            transition: transform .13s;
            margin-bottom: 14px;
        }

        .qz-next-btn:active {
            transform: scale(.98);
        }

        /* ── results screen ── */
        .qz-result-screen {
            text-align: center;
            padding: 20px 0 10px;
            animation: qzIn .35s ease both;
        }

        .qz-result-ring {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
            position: relative;
        }

        .qz-result-ring svg {
            transform: rotate(-90deg);
        }

        .qz-result-pct {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fd);
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
        }

        .qz-result-title {
            font-family: var(--fd);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }

        .qz-result-sub {
            font-size: 14px;
            color: var(--text3);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .qz-result-breakdown {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            text-align: left;
        }

        .qz-result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13.5px;
        }

        .qz-result-row:last-child {
            border-bottom: none;
        }

        .qz-result-q {
            flex: 1;
            color: var(--text2);
            margin-right: 10px;
            line-height: 1.4;
        }

        .qz-result-mark {
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .qz-result-mark.ok {
            color: var(--green);
        }

        .qz-result-mark.ko {
            color: var(--red);
        }

        .qz-restart-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--acc), #9e8cfb);
            border: none;
            color: #fff;
            font-family: var(--fd);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 18px var(--acc-glow);
            margin-bottom: 8px;
        }

        .qz-retry-btn {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .13s;
        }

        .qz-retry-btn:hover {
            background: var(--surf2);
        }

        /* ── edit mode ── */
        .qz-edit-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .qz-edit-search {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
            width: 100%;
            margin-bottom: 4px;
        }

        .qz-edit-search:focus {
            border-color: var(--acc);
        }

        .qz-ecard {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 14px;
            overflow: hidden;
        }

        .qz-ecard-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
        }

        .qz-ecard-num {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: rgba(110, 92, 245, .18);
            color: var(--acc2);
            font-family: var(--fd);
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .qz-ecard-q {
            flex: 1;
            font-size: 13.5px;
            color: var(--text);
            line-height: 1.4;
            min-width: 0;
        }

        .qz-ecard-chevron {
            font-size: 12px;
            color: var(--text3);
            transition: transform .2s;
            flex-shrink: 0;
        }

        .qz-ecard.open .qz-ecard-chevron {
            transform: rotate(180deg);
        }

        .qz-ecard-body {
            padding: 0 14px 14px;
            display: none;
        }

        .qz-ecard.open .qz-ecard-body {
            display: block;
        }

        .qz-efield {
            margin-bottom: 10px;
        }

        .qz-efield label {
            display: block;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: .8px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 5px;
        }

        .qz-efield input,
        .qz-efield textarea,
        .qz-efield select {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 9px 12px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13.5px;
            outline: none;
            transition: border-color .14s;
            resize: none;
        }

        .qz-efield input:focus,
        .qz-efield textarea:focus {
            border-color: var(--acc);
        }

        .qz-opts-edit {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }

        .qz-opt-edit-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .qz-opt-edit-inp {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 9px;
            padding: 8px 11px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13.5px;
            outline: none;
            transition: border-color .14s;
        }

        .qz-opt-edit-inp:focus {
            border-color: var(--acc);
        }

        .qz-opt-correct-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1.5px solid var(--border2);
            background: var(--surf2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            transition: all .13s;
        }

        .qz-opt-correct-btn.on {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
        }

        .qz-add-opt-btn {
            padding: 7px 12px;
            border-radius: 9px;
            border: 1px dashed var(--border2);
            background: transparent;
            color: var(--text3);
            font-size: 12.5px;
            cursor: pointer;
            transition: all .13s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qz-add-opt-btn:hover {
            border-color: var(--acc2);
            color: var(--acc2);
        }

        .qz-ecard-actions {
            display: flex;
            gap: 7px;
            margin-top: 10px;
        }

        .qz-save-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            background: var(--acc);
            border: none;
            color: #fff;
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .13s;
        }

        .qz-save-btn:hover {
            opacity: .85;
        }

        .qz-del-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: none;
            background: var(--red-bg);
            color: var(--red);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .qz-add-q-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px;
            border-radius: 14px;
            border: 2px dashed var(--border2);
            background: transparent;
            color: var(--text3);
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all .15s;
        }

        .qz-add-q-btn:hover {
            border-color: var(--acc);
            color: var(--acc2);
        }

        .qz-import-box {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .qz-import-title {
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .qz-import-ta {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 12.5px;
            outline: none;
            resize: none;
            min-height: 90px;
            transition: border-color .14s;
        }

        .qz-import-ta:focus {
            border-color: var(--acc);
        }

        .qz-import-hint {
            font-size: 11.5px;
            color: var(--text3);
            margin: 6px 0 10px;
            line-height: 1.6;
        }

        .qz-import-btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: var(--surf2);
            border: none;
            color: var(--text2);
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .13s;
        }

        .qz-import-btn:hover {
            background: var(--acc);
            color: #fff;
        }

        .qz-mode-row {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        .qz-mode-btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-family: var(--fd);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .13s;
            text-align: center;
        }

        .qz-mode-btn.on {
            background: var(--surf2);
            border-color: var(--border3);
            color: var(--text);
        }

        /* ═══════════════════════════════════════════
   HOME SEARCH BAR
═══════════════════════════════════════════ */
        .home-search-row {
            display: flex;
            gap: 8px;
            padding: 5px 22px 10px;
            align-items: center;
        }

        .home-search-wrap {
            position: relative;
            flex: 1;
        }

        .home-search {
            width: 100%;
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 13px;
            padding: 14px 36px 13px 72px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .home-search:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .home-search-ico {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            pointer-events: none;
            opacity: .45;
        }

        .home-search-actions {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 8px;
            flex-direction: row-reverse;
        }

        .hs-btn {
            width: 26px;
            height: 29px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text3);
            font-size: 21px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .13s, color .13s;
        }

        .hs-btn:hover {
            background: var(--surf2);
            color: var(--text);
        }

        .hs-btn.active {
            color: var(--red);
            animation: recPulse2 1.4s ease-in-out infinite;
        }

        @keyframes recPulse2 {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .hs-btn.clear {
            color: var(--text3);
        }

        /* ═══════════════════════════════════════════
   IMPORT / EXPORT (plugin nav extra action)
═══════════════════════════════════════════ */
        .io-sheet-body {
            padding: 0 20px 24px;
        }

        .io-section {
            margin-bottom: 20px;
        }

        .io-title {
            font-family: var(--fd);
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .io-sub {
            font-size: 12.5px;
            color: var(--text3);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .io-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 14px 16px;
            border-radius: 13px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            cursor: pointer;
            transition: all .15s;
            margin-bottom: 8px;
        }

        .io-btn:hover {
            border-color: var(--border3);
            background: var(--surf2);
        }

        .io-btn-ico {
            font-size: 20px;
            flex-shrink: 0;
        }

        .io-btn-info {
            flex: 1;
            text-align: left;
        }

        .io-btn-label {
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 600;
        }

        .io-btn-desc {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 1px;
        }

        .io-btn.accent {
            background: rgba(110, 92, 245, .1);
            border-color: var(--acc);
            color: var(--acc2);
        }

        .io-btn.accent:hover {
            background: rgba(110, 92, 245, .18);
        }

        .io-file-input {
            display: none;
        }

        .io-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ═══════════════════════════════════════════
   PLUGIN: EDITOR DE TEXTO
═══════════════════════════════════════════ */
        .tx-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .tx-toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 6px 10px;
            background: var(--bg1);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
            row-gap: 2px;
        }

        .tx-sep {
            width: 1px;
            height: 20px;
            background: var(--border2);
            margin: 0 3px;
            flex-shrink: 0;
        }

        .tx-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .13s, color .13s;
            flex-shrink: 0;
            font-family: var(--fb);
            font-weight: 600;
        }

        .tx-btn:hover {
            background: var(--surf);
            color: var(--text);
        }

        .tx-btn.on {
            background: rgba(110, 92, 245, .22);
            color: var(--acc2);
        }

        .tx-btn-wide {
            width: auto;
            padding: 0 9px;
            font-size: 11.5px;
        }

        .tx-font-sel,
        .tx-size-sel {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 7px;
            padding: 3px 7px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .tx-font-sel {
            max-width: 100px;
        }

        .tx-size-sel {
            width: 52px;
        }

        .tx-font-sel option,
        .tx-size-sel option {
            background: var(--bg2);
        }

        /* sub-toolbars that slide in */
        .tx-sub-bar {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            animation: up .18s ease both;
            flex-wrap: wrap;
        }

        .tx-sub-bar.on {
            display: flex;
        }

        .tx-link-inp,
        .tx-tbl-inp {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 7px 11px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13px;
            outline: none;
            transition: border-color .14s;
        }

        .tx-link-inp {
            flex: 1;
        }

        .tx-link-inp:focus,
        .tx-tbl-inp:focus {
            border-color: var(--acc);
        }

        .tx-tbl-inp {
            width: 44px;
            text-align: center;
        }

        .tx-sub-lbl {
            font-size: 11.5px;
            color: var(--text3);
        }

        .tx-sub-ok {
            padding: 7px 13px;
            border-radius: 8px;
            border: none;
            background: var(--acc);
            color: #fff;
            font-family: var(--fd);
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
        }

        .tx-sub-cancel {
            padding: 7px 10px;
            border-radius: 8px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-size: 12.5px;
            cursor: pointer;
        }

        /* color swatches */
        .tx-color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform .13s, border-color .13s;
            flex-shrink: 0;
        }

        .tx-color-swatch:hover {
            transform: scale(1.25);
            border-color: var(--border3);
        }

        .tx-color-inp {
            opacity: 0;
            width: 22px;
            height: 22px;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        /* editor */
        .tx-editor-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .tx-editor {
            min-height: 60vh;
            padding: 20px 22px 80px;
            outline: none;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text);
            caret-color: var(--acc2);
        }

        .tx-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--text3);
            pointer-events: none;
        }

        .tx-editor h1 {
            font-family: var(--fd);
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin: 20px 0 8px;
        }

        .tx-editor h2 {
            font-family: var(--fd);
            font-size: 21px;
            font-weight: 700;
            line-height: 1.3;
            margin: 16px 0 6px;
        }

        .tx-editor h3 {
            font-family: var(--fd);
            font-size: 17px;
            font-weight: 600;
            line-height: 1.4;
            margin: 12px 0 5px;
        }

        .tx-editor blockquote {
            border-left: 3px solid var(--acc);
            padding-left: 14px;
            margin: 12px 0;
            color: var(--text2);
            font-style: italic;
        }

        .tx-editor code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 5px;
            padding: 1px 6px;
            color: var(--acc2);
        }

        .tx-editor pre {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 14px;
            margin: 12px 0;
            overflow-x: auto;
        }

        .tx-editor pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text2);
            font-size: 13px;
        }

        .tx-editor ul,
        .tx-editor ol {
            padding-left: 22px;
            margin: 6px 0;
        }

        .tx-editor li {
            margin-bottom: 2px;
        }

        .tx-editor hr {
            border: none;
            border-top: 1px solid var(--border2);
            margin: 18px 0;
        }

        .tx-editor table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 14px;
        }

        .tx-editor th {
            background: var(--surf);
            border: 1px solid var(--border2);
            padding: 8px 10px;
            font-family: var(--fd);
            font-weight: 600;
            text-align: left;
        }

        .tx-editor td {
            border: 1px solid var(--border);
            padding: 7px 10px;
        }

        .tx-editor a {
            color: var(--acc2);
            text-decoration: underline;
        }

        .tx-editor mark {
            background: rgba(245, 187, 69, .3);
            color: var(--amber);
            border-radius: 3px;
            padding: 0 2px;
        }

        /* status bar */
        .tx-statusbar {
            position: sticky;
            bottom: 0;
            background: var(--bg1);
            border-top: 1px solid var(--border);
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text3);
            flex-shrink: 0;
        }

        .tx-statusbar span {
            white-space: nowrap;
        }

        .tx-saved-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            background: var(--green-bg);
            color: var(--green);
            font-size: 10.5px;
            font-weight: 600;
        }

        .tx-focus-toggle {
            margin-left: auto;
            padding: 3px 9px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text3);
            font-size: 11px;
            cursor: pointer;
            font-family: var(--fd);
            font-weight: 600;
            transition: all .13s;
        }

        .tx-focus-toggle:hover {
            background: var(--surf);
            color: var(--text);
        }

        .tx-focus-toggle.on {
            background: rgba(110, 92, 245, .15);
            color: var(--acc2);
            border-color: var(--acc);
        }

        /* focus mode */
        .tx-wrap.focus .tx-toolbar {
            opacity: .15;
            transition: opacity .3s;
        }

        .tx-wrap.focus .tx-toolbar:hover {
            opacity: 1;
        }

        .hr-wrap {
            padding: 14px 16px 80px;
        }

        /* ── tabs ── */
        .hr-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        .hr-tab {
            flex: 1;
            padding: 8px 0;
            border-radius: 11px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
        }

        .hr-tab.on {
            background: var(--acc);
            border-color: var(--acc);
            color: #fff;
            box-shadow: 0 4px 14px var(--acc-glow);
        }

        /* ── summary strip ── */
        .hr-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .hr-sum-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 12px 14px;
        }

        .hr-sum-val {
            font-family: var(--fd);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .hr-sum-lbl {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
        }

        .hr-sum-card.green .hr-sum-val {
            color: var(--green);
        }

        .hr-sum-card.amber .hr-sum-val {
            color: var(--amber);
        }

        .hr-sum-card.acc .hr-sum-val {
            color: var(--acc2);
        }

        .hr-sum-card.red .hr-sum-val {
            color: var(--red);
        }

        /* ── settings box ── */
        .hr-settings {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 13px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .hr-settings-title {
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .hr-settings-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .hr-set-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hr-set-field label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: var(--text3);
        }

        .hr-set-inp {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 9px;
            padding: 8px 11px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 13.5px;
            outline: none;
            transition: border-color .14s;
            width: 100%;
        }

        .hr-set-inp:focus {
            border-color: var(--acc);
        }

        /* ── add day btn ── */
        .hr-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            border-radius: 13px;
            border: 2px dashed var(--border2);
            background: transparent;
            color: var(--text3);
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            margin-bottom: 14px;
        }

        .hr-add-btn:hover {
            border-color: var(--acc);
            color: var(--acc2);
        }

        /* ── period nav ── */
        .hr-period-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .hr-period-title {
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .hr-period-btns {
            display: flex;
            gap: 6px;
        }

        .hr-pnav-btn {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .13s;
        }

        .hr-pnav-btn:hover {
            background: var(--surf2);
        }

        /* ── day card ── */
        .hr-day-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 8px;
            animation: up .2s ease both;
        }

        .hr-day-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
        }

        .hr-day-date {
            flex: 1;
        }

        .hr-day-name {
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            text-transform: capitalize;
        }

        .hr-day-sub {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .hr-day-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .hr-day-badge.ok {
            background: var(--green-bg);
            color: var(--green);
        }

        .hr-day-badge.low {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .hr-day-badge.zero {
            background: var(--surf2);
            color: var(--text3);
        }

        .hr-day-chev {
            font-size: 12px;
            color: var(--text3);
            transition: transform .2s;
            flex-shrink: 0;
        }

        .hr-day-card.open .hr-day-chev {
            transform: rotate(180deg);
        }

        .hr-day-body {
            display: none;
            padding: 0 14px 14px;
        }

        .hr-day-card.open .hr-day-body {
            display: block;
        }

        /* time grid */
        .hr-time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .hr-time-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hr-time-field label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: var(--text3);
        }

        .hr-time-inp {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 9px;
            padding: 8px 11px;
            color: var(--text);
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            outline: none;
            transition: border-color .14s;
            width: 100%;
            text-align: center;
        }

        .hr-time-inp:focus {
            border-color: var(--acc);
        }

        /* day extras */
        .hr-extras-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .hr-day-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg3);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }

        .hr-day-res-lbl {
            font-size: 12.5px;
            color: var(--text2);
        }

        .hr-day-res-val {
            font-family: var(--fd);
            font-size: 16px;
            font-weight: 800;
            color: var(--green);
        }

        .hr-day-actions {
            display: flex;
            gap: 7px;
        }

        .hr-day-save-btn {
            flex: 1;
            padding: 9px;
            border-radius: 10px;
            background: var(--acc);
            border: none;
            color: #fff;
            font-family: var(--fd);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .13s;
        }

        .hr-day-save-btn:hover {
            opacity: .85;
        }

        .hr-day-del-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--red-bg);
            color: var(--red);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ── finance panel ── */
        .hr-finance {
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .hr-fin-title {
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }

        .hr-fin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .hr-fin-row:last-child {
            border-bottom: none;
        }

        .hr-fin-row .lbl {
            color: var(--text2);
            flex: 1;
        }

        .hr-fin-row .val {
            font-family: var(--fd);
            font-weight: 700;
        }

        .hr-fin-row .val.green {
            color: var(--green);
        }

        .hr-fin-row .val.red {
            color: var(--red);
        }

        .hr-fin-row .val.amber {
            color: var(--amber);
        }

        .hr-fin-sep {
            height: 1px;
            background: var(--border2);
            margin: 8px 0;
        }

        .hr-fin-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 2px;
        }

        .hr-fin-total-lbl {
            font-family: var(--fd);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .hr-fin-total-val {
            font-family: var(--fd);
            font-size: 24px;
            font-weight: 800;
        }

        /* ── export btn ── */
        .hr-export-btn {
            width: 100%;
            padding: 13px;
            border-radius: 13px;
            border: 1px solid var(--border2);
            background: var(--surf);

<body>

    <div id="shell">

        <!-- HOME VIEW -->
        <div class="view active" id="viewHome">
            <header class="home-header">
                <div class="home-top">
                    <span class="logo">Hub<span class="logo-dot"></span></span>
                    <span id="homeDate"></span>
                </div>
                <div class="home-sub">Meu espaço pessoal</div>
            </header>
            <div class="chips-row" id="chipsRow"></div>
            <div class="home-search-row">
                <div class="home-search-wrap">
                    <span class="home-search-ico">🔍</span>
                    <input class="home-search" id="homeSearch" type="text" placeholder="Pesquisar registros…"
                        oninput="Home.onSearch(this.value)">
                    <div class="home-search-actions">
                        <button class="hs-btn clear" id="hsClear" style="display:none" onclick="Home.clearSearch()"
                            title="Limpar">✕</button>
                        <button class="hs-btn" id="hsMic" onclick="Home.toggleVoice()"
                            title="Pesquisar por voz">🎙️</button>
                    </div>

            </div>
            <div class="view-scroll">
                <div class="home-content">
                    <p class="section-label">Registros</p>

                </div>
            </div>
        </div>

        <!-- PLUGIN VIEW -->
        <div class="view forward" id="viewPlugin">
            <nav class="plugin-nav">
                <button class="back" id="pluginBack">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <div class="plugin-nav-info">
                    <div class="plugin-nav-title" id="pluginNavTitle">—</div>
                    <div class="plugin-nav-sub" id="pluginNavSub">—</div>
                </div>
                <div class="nav-actions" id="pluginNavActions"></div>
            </nav>
            <div class="view-scroll" id="pluginBody"></div>
        </div>

        <!-- FAB -->
        <div class="fab-wrap">
            <button class="fab" id="fabBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- ADD SHEET -->
    <div class="overlay" id="addOverlay">
        <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-head">
                <span class="sheet-title">Novo registro</span>
                <button class="x-btn" id="sheetClose">✕</button>
            </div>
            <div class="sheet-body">
                <p class="section-label" style="margin-top:0">Tipo</p>
                <div class="tiles" id="pluginTiles"></div>
                <div class="field">
                    <label>Título</label>
                    <input type="text" id="newTitle" placeholder="Nome do registro…" />
                </div>
                <div class="field">
                    <label>Descrição <span style="opacity:.4;font-size:10px">(opcional)</span></label>
                    <textarea id="newDesc" placeholder="Adicione uma descrição…"></textarea>
                </div>
                <button class="btn-main" id="createBtn">Criar registro</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- IO SHEET (import/export per plugin) -->
    <div class="overlay" id="ioOverlay">
        <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-head">
                <span class="sheet-title" id="ioSheetTitle">Importar / Exportar</span>
                <button class="x-btn" onclick="IO.close()">✕</button>
            </div>
            <div class="io-sheet-body">

                <div class="io-section">
                    <div class="io-title">📤 Exportar</div>
                    <div class="io-sub">Salva um arquivo <code>.hubplugin</code> com todos os dados deste registro. Você
                        pode importar em outro dispositivo.</div>
                    <button class="io-btn accent" onclick="IO.exportRecord()">
                        <span class="io-btn-ico">💾</span>
                        <div class="io-btn-info">
                            <div class="io-btn-label">Exportar este registro</div>
                            <div class="io-btn-desc">Gera um arquivo .hubplugin para download</div>
                        </div>
                    </button>

                <div class="io-divider"></div>

                <div class="io-section">
                    <div class="io-title">📥 Importar</div>
                    <div class="io-sub">Selecione um arquivo <code>.hubplugin</code> exportado anteriormente para
                        restaurar o registro.</div>
                    <button class="io-btn" onclick="document.getElementById('ioFileInput').click()">
                        <span class="io-btn-ico">📂</span>
                        <div class="io-btn-info">
                            <div class="io-btn-label">Selecionar arquivo .hubplugin</div>
                            <div class="io-btn-desc">Abre o seletor de arquivos</div>
                        </div>
                    </button>
                    <input type="file" id="ioFileInput" class="io-file-input" accept=".hubplugin,.json"
                        onchange="IO.importFile(this)">
                </div>

            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════
     CORE ENGINE
════════════════════════════════════════════ -->
    <script>
        'use strict';

        /* ─────────────────────────────────────────
           INDEXEDDB
        ───────────────────────────────────────── */
        const DB = (() => {
            let _db;
            const _ready = new Promise((res, rej) => {
                const req = indexedDB.open('hub_v1', 1);
                req.onupgradeneeded = e => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('records')) {
                        const st = d.createObjectStore('records', { keyPath: 'id' });
                        st.createIndex('type', 'type', { unique: false });
                        st.createIndex('createdAt', 'createdAt', { unique: false });
                    }
                };
                req.onsuccess = e => { _db = e.target.result; res(_db); };
                req.onerror = () => rej(req.error);
            });

            const _st = mode => _ready.then(d => d.transaction('records', mode).objectStore('records'));
            const _p = req => new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });

            return {
                getAll: () => _st('readonly').then(st => _p(st.getAll())),
                get: id => _st('readonly').then(st => _p(st.get(id))),
                put: rec => _st('readwrite').then(st => _p(st.put(rec))),
                del: id => _st('readwrite').then(st => _p(st.delete(id))),
            };
        })();

        /* ─────────────────────────────────────────
           PLUGIN REGISTRY
           registerPlugin(pluginObject) — that is all
           you need to add a new plugin.
        ───────────────────────────────────────── */
        const PLUGINS = [];
        function registerPlugin(p) { PLUGINS.push(p); }

        /* ─────────────────────────────────────────
           APP STATE
        ───────────────────────────────────────── */
        const App = {
            records: [],
            currentFilter: 'all',
            activeRecord: null,
            activePlugin: null,
            searchQuery: '',

            async loadAll() {
                const rows = await DB.getAll();
                this.records = rows.sort((a, b) => b.updatedAt - a.updatedAt);
            },

            async saveRecord(rec) {
                rec.updatedAt = Date.now();
                await DB.put(rec);
                const i = this.records.findIndex(r => r.id === rec.id);
                if (i >= 0) this.records[i] = rec; else this.records.unshift(rec);
                this.records.sort((a, b) => b.updatedAt - a.updatedAt);
            },

            async deleteRecord(id) {
                await DB.del(id);
                this.records = this.records.filter(r => r.id !== id);
            },
        };

        /* ─────────────────────────────────────────
           NAVIGATION
        ───────────────────────────────────────── */
        const Nav = {
            openPlugin(record) {
                const plugin = PLUGINS.find(p => p.id === record.type);
                if (!plugin) { toast('Plugin não encontrado'); return; }

                App.activeRecord = record;
                App.activePlugin = plugin;

                document.getElementById('pluginNavTitle').textContent = record.title;
                document.getElementById('pluginNavSub').textContent = plugin.name;

                // Render optional nav action buttons defined by plugin + always add IO button
                const actionsEl = document.getElementById('pluginNavActions');
                const pluginBtns = (plugin.navActions || []).map(a =>
                    `<button class="ico-btn" data-action="${a.id}" title="${a.title}">${a.icon}</button>`
                ).join('');
                const ioBtnHtml = `<button class="ico-btn" data-action="__io" title="Importar / Exportar">📦</button>`;
                actionsEl.innerHTML = pluginBtns + ioBtnHtml;
                actionsEl.onclick = e => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;
                    if (btn.dataset.action === '__io') { IO.open(record); return; }
                    const action = (plugin.navActions || []).find(a => a.id === btn.dataset.action);
                    if (action) action.handler(record);
                };

                // Mount plugin into body
                const body = document.getElementById('pluginBody');
                body.innerHTML = '';
                plugin.mount(body, record);

                document.getElementById('viewHome').className = 'view behind';
                document.getElementById('viewPlugin').className = 'view active';
                document.getElementById('fabBtn').style.display = 'none';
            },

            closePlugin() {
                if (App.activePlugin?.unmount) App.activePlugin.unmount();
                document.getElementById('viewHome').className = 'view active';
                document.getElementById('viewPlugin').className = 'view forward';
                document.getElementById('fabBtn').style.display = '';
                App.activeRecord = null;
                App.activePlugin = null;
                Home.render();
            },
        };

        /* ─────────────────────────────────────────
           HOME
        ───────────────────────────────────────── */
        const Home = {
            _voiceRec: null,
            _voiceActive: false,

            render() {
                this._renderChips();
                this._renderCards();
            },

            _renderChips() {
                const row = document.getElementById('chipsRow');
                row.innerHTML = [
                    { id: 'all', label: 'Todos' },
                    ...PLUGINS.map(p => ({ id: p.id, label: p.icon + ' ' + p.name }))
                ].map(c => `
      <button class="chip ${App.currentFilter === c.id ? 'on' : ''}"
        onclick="App.currentFilter='${c.id}';Home.render()">
        ${c.label}
      </button>`
                ).join('');
            },

            _renderCards() {
                const cont = document.getElementById('cardsContainer');
                const q = App.searchQuery.toLowerCase().trim();

                let list = App.currentFilter === 'all'
                    ? App.records
                    : App.records.filter(r => r.type === App.currentFilter);

                if (q) {
                    list = list.filter(r =>
                        r.title.toLowerCase().includes(q) ||
                        (r.description || '').toLowerCase().includes(q) ||
                        PLUGINS.find(p => p.id === r.type)?.name.toLowerCase().includes(q)
                    );
                }

                if (!list.length) {
                    cont.innerHTML = q
                        ? `<div class="empty"><span class="ico">🔍</span><h3>Nada encontrado</h3><p>Nenhum registro corresponde a "<strong>${esc(q)}</strong>".</p></div>`
                        : `<div class="empty"><span class="ico">✨</span><h3>Nenhum registro ainda</h3><p>Toque no <strong>+</strong> para criar o primeiro.</p></div>`;
                    return;
                }

                cont.innerHTML = list.map((rec, i) => {
                    const plugin = PLUGINS.find(p => p.id === rec.type);
                    if (!plugin) return '';
                    const preview = plugin.cardPreview?.(rec) || '';
                    const badge = plugin.cardBadge?.(rec) || '';
                    const date = new Date(rec.createdAt).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
                    return `
        <div class="card" style="animation-delay:${i * .05}s"
          onclick="Nav.openPlugin(App.records.find(r=>r.id==='${rec.id}'))">
          <div class="card-stripe" style="background:${plugin.color}"></div>
          <div class="card-head">
            <div class="card-icon" style="background:${plugin.color}22">${plugin.icon}</div>
            <div class="card-info">
              <div class="card-name">${esc(rec.title)}</div>
              <div class="card-type">${plugin.name}</div>
            </div>
            <button class="card-del"
              onclick="event.stopPropagation();Sheet.deleteRecord('${rec.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </button>
          </div>
          ${preview ? `<div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5">${preview}</div>` : ''}
          <div class="card-foot">${badge}<span class="card-age">${date}</span></div>
        </div>`;
                }).join('');
            },

            onSearch(val) {
                App.searchQuery = val;
                const clearBtn = document.getElementById('hsClear');
                if (clearBtn) clearBtn.style.display = val ? '' : 'none';
                this._renderCards();
            },

            clearSearch() {
                App.searchQuery = '';
                const inp = document.getElementById('homeSearch');
                if (inp) inp.value = '';
                const clearBtn = document.getElementById('hsClear');
                if (clearBtn) clearBtn.style.display = 'none';
                this._renderCards();
                inp?.focus();
            },

            toggleVoice() {
                if (this._voiceActive) { this._stopVoice(); return; }

                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { toast('Reconhecimento de voz não suportado neste navegador'); return; }

                const mic = document.getElementById('hsMic');
                this._voiceRec = new SR();
                this._voiceRec.lang = 'pt-BR';
                this._voiceRec.continuous = false;
                this._voiceRec.interimResults = true;

                this._voiceRec.onstart = () => {
                    this._voiceActive = true;
                    if (mic) mic.classList.add('active');
                    toast('🎙️ Ouvindo…');
                };
                this._voiceRec.onresult = e => {
                    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
                    const inp = document.getElementById('homeSearch');
                    if (inp) inp.value = transcript;
                    this.onSearch(transcript);
                };
                this._voiceRec.onerror = () => { this._stopVoice(); toast('Erro no microfone'); };
                this._voiceRec.onend = () => this._stopVoice();

                this._voiceRec.start();
            },

            _stopVoice() {
                this._voiceActive = false;
                const mic = document.getElementById('hsMic');
                if (mic) mic.classList.remove('active');
                try { this._voiceRec?.stop(); } catch (e) { }
                this._voiceRec = null;
            },
        };

        /* ─────────────────────────────────────────
           ADD SHEET
        ───────────────────────────────────────── */
        const Sheet = {
            selectedType: null,

            open() {
                this.selectedType = PLUGINS[0]?.id ?? null;
                this._renderTiles();
                document.getElementById('newTitle').value = '';
                document.getElementById('newDesc').value = '';
                document.getElementById('addOverlay').classList.add('on');
                setTimeout(() => document.getElementById('newTitle').focus(), 340);
            },

            close() {
                document.getElementById('addOverlay').classList.remove('on');
            },

            _renderTiles() {
                const COMING_SOON = [

                    // { icon: '📊', name: 'Tabela' }, coloque aqui os proximos lançamentos 
                ];
                // Fill with real plugins first, then coming-soon placeholders
                const tiles = [
                    ...PLUGINS.map(p => ({
                        html: `<div class="tile ${p.id === this.selectedType ? 'sel' : ''}"
          onclick="Sheet.selectType('${p.id}',this)">
          <span class="tile-ico">${p.icon}</span>
          <span class="tile-lbl">${p.name}</span>
        </div>`
                    })),
                    ...COMING_SOON.map(c => ({
                        html: `<div class="tile dim">
          <span class="tile-ico">${c.icon}</span>
          <span class="tile-lbl">${c.name}<br><span class="soon">em breve</span></span>
        </div>`
                    }))
                ];
                document.getElementById('pluginTiles').innerHTML = tiles.map(t => t.html).join('');
            },

            selectType(id, el) {
                this.selectedType = id;
                document.querySelectorAll('#pluginTiles .tile').forEach(t => t.classList.remove('sel'));
                el.classList.add('sel');
            },

            async create() {
                const title = document.getElementById('newTitle').value.trim();
                if (!title) { toast('Insira um título'); return; }
                if (!this.selectedType) { toast('Selecione um tipo'); return; }
                const plugin = PLUGINS.find(p => p.id === this.selectedType);
                if (!plugin) { toast('Plugin inválido'); return; }

                const rec = {
                    id: 'r' + Date.now(),
                    type: plugin.id,
                    title,
                    description: document.getElementById('newDesc').value.trim(),
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    data: plugin.defaultData?.() ?? {},
                };

                await App.saveRecord(rec);
                this.close();
                Home.render();
                toast(plugin.icon + ' Criado!');
                setTimeout(() => Nav.openPlugin(rec), 340);
            },

            async deleteRecord(id) {
                await App.deleteRecord(id);
                Home.render();
                toast('Removido');
            },
        };

        /* ─────────────────────────────────────────
           IMPORT / EXPORT MODULE
        ───────────────────────────────────────── */
        const IO = {
            _record: null,

            open(record) {
                this._record = record;
                const plugin = PLUGINS.find(p => p.id === record.type);
                document.getElementById('ioSheetTitle').textContent =
                    (plugin?.icon || '') + ' ' + (plugin?.name || 'Registro') + ' · I/O';
                document.getElementById('ioOverlay').classList.add('on');
            },

            close() {
                document.getElementById('ioOverlay').classList.remove('on');
                // reset file input so same file can be re-selected
                const fi = document.getElementById('ioFileInput');
                if (fi) fi.value = '';
            },

            exportRecord() {
                if (!this._record) return;
                const plugin = PLUGINS.find(p => p.id === this._record.type);
                const payload = {
                    __hub_version: 1,
                    plugin: this._record.type,
                    exportedAt: Date.now(),
                    record: this._record,
                };

                // For audio plugin: data URIs are already embedded in base64, keep as-is
                const json = JSON.stringify(payload, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${this._record.title.replace(/[^a-z0-9]/gi, '_')}_${this._record.type}.hubplugin`;
                a.click();
                URL.revokeObjectURL(url);
                toast('📤 Exportado com sucesso!');
            },

            importFile(input) {
                const file = input.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async e => {
                    try {
                        const payload = JSON.parse(e.target.result);
                        if (payload.__hub_version !== 1 || !payload.record || !payload.plugin) {
                            toast('❌ Arquivo inválido ou corrompido'); return;
                        }
                        const plugin = PLUGINS.find(p => p.id === payload.plugin);
                        if (!plugin) { toast(`❌ Plugin "${payload.plugin}" não instalado`); return; }

                        const rec = payload.record;
                        // Give it a new ID to avoid conflicts, keep original title
                        const existing = App.records.find(r => r.id === rec.id);
                        if (existing) {
                            // update in place
                            Object.assign(existing, rec);
                            await App.saveRecord(existing);
                            toast('♻️ Registro atualizado!');
                        } else {
                            rec.createdAt = rec.createdAt || Date.now();
                            rec.updatedAt = Date.now();
                            await App.saveRecord(rec);
                            toast('📥 Registro importado: ' + rec.title);
                        }
                        this.close();
                        Home.render();
                    } catch (err) {
                        toast('❌ Erro ao importar: ' + err.message);
                    }
                };
                reader.readAsText(file);
            },
        };

        /* ─────────────────────────────────────────
           UTILS
        ───────────────────────────────────────── */
        function esc(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        let _toastT;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('on');
            clearTimeout(_toastT);
            _toastT = setTimeout(() => el.classList.remove('on'), 2200);
        }

        /* ─────────────────────────────────────────
           WIRE HANDLERS
        ───────────────────────────────────────── */
        document.getElementById('fabBtn').onclick = () => Sheet.open();
        document.getElementById('sheetClose').onclick = () => Sheet.close();
        document.getElementById('createBtn').onclick = () => Sheet.create();
        document.getElementById('pluginBack').onclick = () => Nav.closePlugin();
        document.getElementById('addOverlay').onclick = e => { if (e.target === e.currentTarget) Sheet.close(); };
        document.getElementById('ioOverlay').onclick = e => { if (e.target === e.currentTarget) IO.close(); };

        // Swipe-back gesture
        (() => {
            const v = document.getElementById('viewPlugin');
            let sx = 0, sy = 0;
            v.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
            v.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - sx;
                const dy = Math.abs(e.changedTouches[0].clientY - sy);
                if (dx > 60 && dy < 40 && sx < 60) Nav.closePlugin();
            }, { passive: true });
        })();

        document.getElementById('homeDate').textContent =
            new Date().toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
    </script>

    <!-- ════════════════════════════════════════════
     PLUGIN: LISTA DE COMPRAS
     ┌─────────────────────────────────────────┐
     │  Para adicionar um novo plugin:          │
     │  1. Copie este bloco <script>            │
     │  2. Preencha os campos do objeto         │
     │  3. Implemente mount() e as actions      │
     │  Pronto. O restante do app não muda.     │
     └─────────────────────────────────────────┘
════════════════════════════════════════════ -->
    <script>
        registerPlugin({

            /* ── Identidade ─────────────────────────── */
            id: 'lista',
            name: 'Lista de Compras',
            icon: '🛒',
            color: '#6e5cf5',

            /* ── Dados padrão ao criar ──────────────── */
            defaultData: () => ({ items: [], qty: 1, cat: 'geral' }),

            /* ── Preview no card da home ────────────── */
            cardPreview(rec) {
                const t = rec.data.items.length;
                if (!t) return 'Lista vazia';
                const d = rec.data.items.filter(i => i.done).length;
                return `${t} iten${t !== 1 ? 's' : ''} · ${d} marcado${d !== 1 ? 's' : ''}`;
            },

            cardBadge(rec) {
                const t = rec.data.items.length;
                const d = rec.data.items.filter(i => i.done).length;
                const p = t ? Math.round(d / t * 100) : 0;
