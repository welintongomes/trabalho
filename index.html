<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090f">
    <title>Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
        :root {
            --bg: #09090f;
            --bg1: #0f0f18;
            --bg2: #14141f;
            --bg3: #1a1a28;
            --surf: #1f1f30;
            --surf2: #272738;
            --border: rgba(255, 255, 255, 0.06);
            --border2: rgba(255, 255, 255, 0.11);
            --border3: rgba(255, 255, 255, 0.18);
            --text: #eeeef5;
            --text2: #8888a8;
            --text3: #4c4c68;
            --acc: #6e5cf5;
            --acc2: #9b8af9;
            --acc-glow: rgba(110, 92, 245, .28);
            --green: #3ecf7a;
            --green-bg: rgba(62, 207, 122, .1);
            --red: #f05f5f;
            --red-bg: rgba(240, 95, 95, .1);
            --amber: #f5bb45;
            --amber-bg: rgba(245, 187, 69, .1);
            --r: 20px;
            --r-sm: 12px;
            --sh: 0 12px 40px rgba(0, 0, 0, .5);
            --fd: 'Bricolage Grotesque', sans-serif;
            --fb: 'Instrument Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--fb);
            min-height: 100dvh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
        #shell {
            width: 100%;
            max-width: 768px;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media(min-width:520px) {
            #shell {
                border-left: 1px solid var(--border2);
                border-right: 1px solid var(--border2);
            }
        }

        /* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
        .view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column-reverse;
            background: var(--bg);
            transition: transform .32s cubic-bezier(.32, .72, 0, 1);
            will-change: transform;
        }

        .view.behind {
            transform: translateX(-30%);
            pointer-events: none;
        }

        .view.active {
            transform: translateX(0);
        }

        .view.forward {
            transform: translateX(100%);
            pointer-events: none;
        }

        .view-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 24px);
            scrollbar-width: none;
        }

        .view-scroll::-webkit-scrollbar {
            display: none;
        }

        /* ═══════════════════════════════════════════
   HOME HEADER
═══════════════════════════════════════════ */
        .home-header {
            padding: 31px 22px 0;
            flex-shrink: 0;
        }

        .home-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .logo {
            font-family: var(--fd);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(130deg, #fff 30%, var(--acc2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--acc);
            border-radius: 50%;
            margin-left: 1px;
            box-shadow: 0 0 10px var(--acc);
            vertical-align: super;
        }

        #homeDate {
            font-size: 13px;
            color: var(--text3);
            letter-spacing: .4px;
        }

        .home-sub {
            font-size: 13.5px;
            color: var(--text3);
            margin-bottom: 14px;
        }

        /* chips */
        .chips-row {
            margin: 0px 23px 0px 27px;
            display: flex;
            gap: 8px;
            overflow-x: scroll;
            padding: 0 22px 12px;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        .chips-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            flex-shrink: 0;
            padding: 11px 14px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-family: var(--fb);
            font-size: 13px;
            cursor: pointer;
            transition: all .18s;
            white-space: nowrap;
        }

        .chip.on {
            background: var(--acc);
            border-color: var(--acc);
            color: #fff;
            box-shadow: 0 4px 16px var(--acc-glow);
        }

        .chip:hover:not(.on) {
            border-color: var(--border3);
            color: var(--text);
        }

        /* home content */
        .home-content {
            padding: 4px 22px 110px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            margin: 14px 0 10px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
        .card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px 16px 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .14s, border-color .14s, box-shadow .14s;
            animation: up .28s ease both;
        }

        .card:active {
            transform: scale(.975);
        }

        .card:hover {
            border-color: var(--border2);
            box-shadow: var(--sh);
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-stripe {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px;
        }

        .card-head {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-family: var(--fd);
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-type {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .card-del {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--text3);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .14s, color .14s;
        }

        .card-del:hover {
            background: var(--red-bg);
            color: var(--red);
        }

        .card-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-g {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge-a {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .badge-p {
            background: rgba(110, 92, 245, .14);
            color: var(--acc2);
        }

        .card-age {
            font-size: 11px;
            color: var(--text3);
        }

        /* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
        .fab-wrap {
            position: fixed;
            bottom: 28px;
            right: 0px;
            left: 0;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 22px;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 80;
        }

        .fab {
            pointer-events: all;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--acc), #9e8cfb);
            border: none;
            color: #fff;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 28px var(--acc-glow), 0 3px 10px rgba(0, 0, 0, .3);
            transition: transform .13s, box-shadow .13s;
        }

        .fab:active {
            transform: scale(.91);
        }

        /* ═══════════════════════════════════════════
   SHEET / OVERLAY
═══════════════════════════════════════════ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .72);
            backdrop-filter: blur(7px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .24s ease;
        }

        .overlay.on {
            opacity: 1;
            pointer-events: all;
        }

        .sheet {
            width: 100%;
            max-width: 480px;
            background: var(--bg1);
            border-radius: 26px 26px 0 0;
            border: 1px solid var(--border2);
            border-bottom: none;
            padding-bottom: env(safe-area-inset-bottom, 22px);
            max-height: 90dvh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform .3s cubic-bezier(.32, .72, 0, 1);
            scrollbar-width: none;
        }

        .sheet::-webkit-scrollbar {
            display: none;
        }

        .overlay.on .sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 34px;
            height: 4px;
            background: var(--border2);
            border-radius: 2px;
            margin: 12px auto 6px;
        }

        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px 14px;
        }

        .sheet-title {
            font-family: var(--fd);
            font-size: 20px;
            font-weight: 700;
        }

        .x-btn {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .14s;
        }

        .x-btn:hover {
            background: var(--surf2);
        }

        .sheet-body {
            padding: 0 20px 22px;
        }

        /* tiles */
        .tiles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 9px;
            margin-bottom: 22px;
        }

        .tile {
            background: var(--surf);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all .16s;
        }

        .tile:hover:not(.dim) {
            border-color: var(--border2);
        }

        .tile.sel {
            border-color: var(--acc);
            background: rgba(110, 92, 245, .1);
            box-shadow: 0 0 0 1px var(--acc);
        }

        .tile.dim {
            opacity: .38;
            cursor: not-allowed;
        }

        .tile-ico {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .tile-lbl {
            font-size: 11px;
            font-weight: 500;
            color: var(--text2);
            line-height: 1.3;
        }

        .tile.sel .tile-lbl {
            color: var(--acc2);
        }

        .soon {
            display: inline-block;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 6px;
            background: var(--surf2);
            color: var(--text3);
            margin-top: 2px;
        }

        /* form */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text3);
            letter-spacing: .8px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        .field input,
        .field textarea {
            width: 100%;
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 14.5px;
            outline: none;
            transition: border-color .15s;
            resize: none;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .field textarea {
            min-height: 76px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--acc), #9e8cfb);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: var(--fd);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 18px var(--acc-glow);
            transition: transform .13s;
        }

        .btn-main:active {
            transform: scale(.98);
        }

        /* ═══════════════════════════════════════════
   PLUGIN NAV
═══════════════════════════════════════════ */
        .plugin-nav {
            padding: 50px 18px 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .back {
            width: 38px;
            height: 55px;
            border-radius: 11px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text);
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .13s;
        }

        .back:hover {
            background: var(--surf2);
        }

        .plugin-nav-info {
            flex: 1;
            min-width: 0;
        }

        .plugin-nav-title {
            font-family: var(--fd);
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .plugin-nav-sub {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .nav-actions {
            display: flex;
            gap: 4px;
        }

        .ico-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .13s, color .13s;
        }

        .ico-btn:hover {
            background: var(--surf);
            color: var(--text);
        }

        /* ═══════════════════════════════════════════
   EMPTY
═══════════════════════════════════════════ */
        .empty {
            text-align: center;
            padding: 56px 28px;
            animation: up .35s ease both;
        }

        .empty .ico {
            font-size: 50px;
            display: block;
            margin-bottom: 14px;
        }

        .empty h3 {
            font-family: var(--fd);
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 7px;
        }

        .empty p {
            font-size: 14px;
            color: var(--text3);
            line-height: 1.6;
            max-width: 240px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
        #toast {
            position: fixed;
            bottom: 96px;
            left: 50%;
            transform: translateX(-50%) translateY(14px);
            background: var(--surf2);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 9px 16px;
            font-size: 13.5px;
            color: var(--text);
            box-shadow: var(--sh);
            z-index: 999;
            opacity: 0;
            transition: opacity .2s, transform .2s;
            white-space: nowrap;
        }

        #toast.on {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ═══════════════════════════════════════════
   PLUGIN: SHOPPING LIST (styles live here
   because this is still a single-file app)
═══════════════════════════════════════════ */
        .sl-wrap {
            padding: 14px 18px 0;
        }

        .sl-progress {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 13px 15px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .sl-prog-info {
            flex: 1;
        }

        .sl-prog-lbl {
            font-size: 11.5px;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .sl-prog-track {
            background: var(--bg3);
            border-radius: 6px;
            height: 5px;
            overflow: hidden;
        }

        .sl-prog-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--acc), var(--green));
            border-radius: 6px;
            transition: width .4s cubic-bezier(.34, 1.56, .64, 1);
        }

        .sl-prog-pct {
            font-family: var(--fd);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
        }

        .sl-add {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .sl-inp {
            flex: 1;
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 11px 14px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }

        .sl-inp:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .sl-qty {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 4px 6px;
            flex-shrink: 0;
        }

        .sl-qb {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: none;
            background: var(--surf2);
            color: var(--text);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .1s;
        }

        .sl-qb:active {
            background: var(--acc);
        }

        .sl-qn {
            width: 20px;
            text-align: center;
            font-family: var(--fd);
            font-size: 15px;
            font-weight: 700;
            user-select: none;
        }

        .sl-addbtn {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border-radius: 12px;
            background: var(--acc);
            border: none;
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--acc-glow);
            transition: transform .1s;
        }

        .sl-addbtn:active {
            transform: scale(.88);
        }

        .sl-cats {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .sl-cats::-webkit-scrollbar {
            display: none;
        }

        .sl-cat {
            flex-shrink: 0;
            padding: 5px 12px;
            border-radius: 10px;
            border: 1px solid var(--border2);
            background: var(--surf);
            color: var(--text2);
            font-size: 12.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all .14s;
        }

        .sl-cat.on {
            background: rgba(110, 92, 245, .14);
            border-color: var(--acc);
            color: var(--acc2);
        }

        .sl-section {
            margin-bottom: 16px;
        }

        .sl-sec-head {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 8px;
        }

        .sl-sec-ico {
            font-size: 14px;
        }

        .sl-sec-name {
            font-family: var(--fd);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
            flex: 1;
        }

        .sl-sec-cnt {
            font-size: 11px;
            color: var(--text3);
        }

        .sl-item {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 11px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 7px;
            transition: all .18s;
            animation: up .2s ease both;
        }

        .sl-item.done {
            opacity: .45;
            background: var(--bg2);
        }

        .sl-cb {
            width: 23px;
            height: 23px;
            border-radius: 7px;
            border: 2px solid var(--border2);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .14s;
            color: #fff;
            font-size: 11px;
        }

        .sl-item.done .sl-cb {
            background: var(--green);
            border-color: var(--green);
        }

        .sl-item-name {
            flex: 1;

            gap: 10px;

            cursor: pointer;
        }

        .fl-ecard-num {
            width: 26px;
            height: 26px;

═══════════════════════════════════════════ */
        .au-wrap {

        }

        /* search bar */
        .au-search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            align-items: center;
        }

            flex: 1;
            background: var(--surf);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 10px 14px 10px 38px;
            color: var(--text);
            font-family: var(--fb);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }

        .au-search:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .au-search-wrap {
            position: relative;
            flex: 1;
        }

        .au-search-ico {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            pointer-events: none;
            opacity: .5;
        }

        /* big record button */
        .au-rec-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 0 24px;
        }

        .au-rec-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .18s;
            position: relative;
            flex-shrink: 0;

        .au-rec-btn.idle {
            background: linear-gradient(135deg, var(--acc), #9e8cfb);
            box-shadow: 0 8px 28px var(--acc-glow);
        }

        .au-rec-btn.idle:hover {
            transform: scale(1.07);
        }

            box-shadow: 0 8px 28px rgba(240, 95, 95, .45);
            animation: recPulse 1.4s ease-in-out infinite;
        }

        .au-rec-btn.paused {
            background: var(--amber);
            box-shadow: 0 8px 28px rgba(245, 187, 69, .35);
        }

        @keyframes recPulse {

            0%,
            100% {
                box-shadow: 0 8px 28px rgba(240, 95, 95, .45), 0 0 0 0 rgba(240, 95, 95, .4);
            }

            50% {
                box-shadow: 0 8px 28px rgba(240, 95, 95, .45), 0 0 0 16px rgba(240, 95, 95, 0);

            font-size: 30px;

            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
